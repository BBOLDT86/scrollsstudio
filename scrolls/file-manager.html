<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>File Manager — DocChain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0A0C14;--bg-s:#10131F;--bg-c:#141829;--bg-ch:#1A1F35;
  --ink:#F0F2F5;--ink-s:#A8B2C1;--ink-m:#5E6B80;--ink-f:#3A4356;
  --accent:#3B82F6;--al:rgba(59,130,246,.12);
  --warm:#F59E0B;--wl:rgba(245,158,11,.1);
  --ok:#10B981;--ol:rgba(16,185,129,.1);
  --purple:#8B5CF6;--pl:rgba(139,92,246,.1);
  --rose:#F43F5E;--rl:rgba(244,63,94,.1);
  --cyan:#06B6D4;--cl:rgba(6,182,212,.1);
  --rule:rgba(255,255,255,.06);--r:14px;--rs:8px;
}
html{scroll-behavior:smooth}
body{font-family:'Geist','Segoe UI',system-ui,sans-serif;background:var(--bg);color:var(--ink);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased}
a{color:var(--accent);text-decoration:none}
a:hover{text-decoration:underline}
button{cursor:pointer;font-family:inherit}
input,textarea,select{font-family:inherit;font-size:inherit}

.dc-topbar{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:.65rem 1.2rem;background:rgba(10,12,20,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--rule)}
.dc-topbar .logo{font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:.82rem;letter-spacing:.05em;color:var(--ink)}
.dc-topbar .logo span{color:var(--accent)}
.dc-topbar .back{font-size:.72rem;color:var(--ink-m);padding:.3rem .7rem;border:1px solid var(--rule);border-radius:6px;transition:all .2s}
.dc-topbar .back:hover{border-color:var(--accent);color:var(--accent);text-decoration:none}
.dc-topbar .app-name{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--ink-m);font-family:'IBM Plex Mono',monospace}

.fm-wrap{max-width:800px;margin:0 auto;padding:1rem}
.fm-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem}
.fm-header h2{font-size:1rem;font-weight:500}
.fm-path{font-size:.7rem;color:var(--ink-m);font-family:'IBM Plex Mono',monospace;margin-bottom:.8rem;padding:.4rem .6rem;background:var(--bg-c);border-radius:6px}
.fm-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.5rem}
.fm-item{background:var(--bg-c);border:1px solid var(--rule);border-radius:var(--rs);padding:1rem;text-align:center;cursor:pointer;transition:all .2s}
.fm-item:hover{border-color:var(--accent);transform:translateY(-2px)}
.fm-item .icon{font-size:2rem;margin-bottom:.4rem}
.fm-item .name{font-size:.75rem;word-break:break-word}
.fm-item .size{font-size:.58rem;color:var(--ink-f);margin-top:.2rem;font-family:'IBM Plex Mono',monospace}
.fm-actions{display:flex;gap:.4rem}
.fm-actions button,.fm-actions label{background:var(--bg-c);border:1px solid var(--rule);color:var(--ink-s);padding:.35rem .7rem;border-radius:6px;font-size:.72rem;cursor:pointer}
.fm-actions button:hover,.fm-actions label:hover{border-color:var(--accent);color:var(--accent)}
</style>
</head><body>
<nav class="dc-topbar">
  <a href="index.html" class="logo">Doc<span>Chain</span></a>
  <span class="app-name">File Manager</span>
  <a href="index.html" class="back">← Hub</a>
</nav>
<div class="fm-wrap"><div class="fm-header"><h2>File Manager</h2><div class="fm-actions"><button onclick="newFolder()">📁 New Folder</button><label>📄 Upload<input type="file" hidden multiple onchange="uploadFiles(this.files)"></label></div></div><div class="fm-path" id="fmPath">/ Documents</div><div class="fm-grid" id="fmGrid"></div></div>
<script>let files=[{name:'Proposals',icon:'📁',type:'folder',size:''},{name:'Contracts',icon:'📁',type:'folder',size:''},{name:'Intelligence Reports',icon:'📁',type:'folder',size:''},{name:'Commonwealth_LNG_Proposal.doc',icon:'📄',size:'245 KB'},{name:'Pipeline_Q1_2026.xlsx',icon:'📊',size:'128 KB'},{name:'E-House_Timeline.pdf',icon:'📑',size:'1.2 MB'},{name:'DCS_Migration_Notes.md',icon:'📝',size:'34 KB'},{name:'UPS_Spec_Sheet.pdf',icon:'📑',size:'567 KB'},{name:'Team_Photo.jpg',icon:'🖼',size:'3.4 MB'}];function render(){document.getElementById('fmGrid').innerHTML=files.map(f=>`<div class="fm-item" onclick="${f.type==='folder'?'':''}"><div class="icon">${f.icon}</div><div class="name">${f.name}</div><div class="size">${f.size}${f.type==='folder'?'':'  · Encrypted'}</div></div>`).join('')}function newFolder(){const n=prompt('Folder name:');if(n)files.unshift({name:n,icon:'📁',type:'folder',size:''});render()}function uploadFiles(fl){Array.from(fl).forEach(f=>files.push({name:f.name,icon:'📄',size:(f.size/1024).toFixed(0)+' KB'}));render()}render();</script>
</body></html>
