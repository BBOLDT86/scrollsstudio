<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blocks — Local-first Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=Charter:ital,wght@0,400;0,700;1,400;1,700&family=IBM+Plex+Mono:wght@400;500&family=Source+Sans+3:ital,wght@0,300;0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #FBFBFA;
  --sidebar-bg: #F7F7F5;
  --sidebar-hover: #EFEFED;
  --sidebar-active: #E8E8E6;
  --text: #37352F;
  --text-secondary: #9B9A97;
  --text-tertiary: #C0BFBC;
  --accent: #EB5757;
  --accent-soft: #FADCD9;
  --blue: #2F80ED;
  --blue-soft: #D3E5EF;
  --green: #27AE60;
  --green-soft: #DBEDDB;
  --yellow: #F2C94C;
  --yellow-soft: #FBF3DB;
  --purple: #9B51E0;
  --purple-soft: #E8DEEE;
  --border: #E9E9E7;
  --shadow: rgba(15,15,15,0.04);
  --shadow-md: rgba(15,15,15,0.08);
  --radius: 4px;
  --font-body: 'Charter', 'Georgia', serif;
  --font-ui: 'Source Sans 3', -apple-system, sans-serif;
  --font-mono: 'IBM Plex Mono', monospace;
  --sidebar-width: 260px;
  --topbar-h: 44px;
}

* { margin:0; padding:0; box-sizing:border-box; }

html, body { height:100%; overflow:hidden; }

body {
  font-family: var(--font-body);
  color: var(--text);
  background: var(--bg);
  font-size: 16px;
  line-height: 1.65;
  -webkit-font-smoothing: antialiased;
}

::selection { background: var(--blue-soft); }

/* ─── LAYOUT ─── */
#app { display:flex; height:100vh; }

/* ─── SIDEBAR ─── */
#sidebar {
  width: var(--sidebar-width);
  min-width: var(--sidebar-width);
  background: var(--sidebar-bg);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  user-select: none;
  transition: margin-left .25s cubic-bezier(.4,0,.2,1), opacity .25s;
  z-index: 20;
}
#sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); opacity: 0; pointer-events: none; }

.sidebar-header {
  padding: 16px 14px 8px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.sidebar-logo {
  font-family: var(--font-ui);
  font-weight: 700;
  font-size: 14px;
  letter-spacing: -.02em;
  color: var(--text);
  display: flex; align-items: center; gap: 7px;
}
.sidebar-logo .logo-icon {
  width: 22px; height: 22px;
  background: var(--text);
  border-radius: 4px;
  display: grid; place-items: center;
  color: white;
  font-size: 13px;
  font-weight: 700;
}
.sidebar-toggle {
  width: 26px; height: 26px;
  border: none; background: none;
  cursor: pointer; border-radius: var(--radius);
  display: grid; place-items: center;
  color: var(--text-secondary);
  font-size: 16px;
  transition: background .15s;
}
.sidebar-toggle:hover { background: var(--sidebar-hover); color: var(--text); }

.sidebar-section-label {
  font-family: var(--font-ui);
  font-size: 11.5px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .06em;
  color: var(--text-secondary);
  padding: 18px 16px 6px;
}

.sidebar-pages { flex:1; overflow-y:auto; padding: 4px 8px; }
.sidebar-pages::-webkit-scrollbar { width:4px; }
.sidebar-pages::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius:2px; }

.page-item {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 5px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--text);
  transition: background .1s;
  position: relative;
}
.page-item:hover { background: var(--sidebar-hover); }
.page-item.active { background: var(--sidebar-active); font-weight: 600; }
.page-item .page-icon { font-size: 18px; flex-shrink:0; width:22px; text-align:center; }
.page-item .page-title { flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.page-item .page-delete {
  display: none;
  width: 22px; height: 22px;
  border: none; background: none;
  cursor: pointer;
  color: var(--text-secondary);
  border-radius: var(--radius);
  font-size: 14px;
  line-height: 22px;
  text-align: center;
}
.page-item:hover .page-delete { display: block; }
.page-item .page-delete:hover { background: var(--accent-soft); color: var(--accent); }

.sidebar-new-page {
  margin: 4px 8px 12px;
  padding: 5px 8px;
  border: none;
  background: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-family: var(--font-ui);
  font-size: 14px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 8px;
  transition: background .1s;
  width: calc(100% - 16px);
  text-align: left;
}
.sidebar-new-page:hover { background: var(--sidebar-hover); color: var(--text); }

.sidebar-footer {
  padding: 12px 16px;
  border-top: 1px solid var(--border);
  font-family: var(--font-ui);
  font-size: 11px;
  color: var(--text-tertiary);
  text-align: center;
}

/* ─── MAIN ─── */
#main { flex:1; display:flex; flex-direction:column; min-width:0; }

#topbar {
  height: var(--topbar-h);
  display: flex;
  align-items: center;
  padding: 0 16px;
  gap: 8px;
  flex-shrink: 0;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
#topbar.scrolled { border-bottom-color: var(--border); }

.topbar-toggle {
  width: 30px; height: 30px;
  border: none; background: none;
  cursor: pointer; border-radius: var(--radius);
  display: none;
  place-items: center;
  color: var(--text-secondary);
  font-size: 18px;
}
.topbar-toggle:hover { background: var(--sidebar-hover); }
#sidebar.collapsed ~ #main .topbar-toggle { display: grid; }

.breadcrumb {
  font-family: var(--font-ui);
  font-size: 13px;
  color: var(--text-secondary);
  display: flex;
  align-items: center;
  gap: 4px;
  overflow: hidden;
}
.breadcrumb span { white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:200px; }

/* ─── EDITOR AREA ─── */
#editor-scroll {
  flex:1;
  overflow-y: auto;
  overflow-x: hidden;
  scroll-behavior: smooth;
}
#editor-scroll::-webkit-scrollbar { width:6px; }
#editor-scroll::-webkit-scrollbar-thumb { background: var(--text-tertiary); border-radius:3px; }

#editor {
  max-width: 720px;
  margin: 0 auto;
  padding: 40px 60px 120px;
  min-height: 100%;
}

/* ─── COVER & ICON ─── */
.page-cover-area {
  margin: -40px -60px 0;
  height: 200px;
  position: relative;
  overflow: hidden;
  cursor: pointer;
  border-radius: 0 0 0 0;
}
.page-cover-area img { width:100%; height:100%; object-fit:cover; }
.page-cover-area .cover-overlay {
  position: absolute; inset:0;
  background: linear-gradient(to bottom, transparent 50%, rgba(0,0,0,.15));
}
.page-cover-area:hover .change-cover-btn { opacity:1; }
.change-cover-btn {
  position: absolute; bottom:12px; right:12px;
  font-family: var(--font-ui);
  font-size: 12px;
  padding: 4px 10px;
  background: rgba(255,255,255,.85);
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  opacity: 0;
  transition: opacity .2s;
  backdrop-filter: blur(4px);
}

.page-icon-area {
  font-size: 64px;
  margin-bottom: 8px;
  cursor: pointer;
  width: fit-content;
  position: relative;
  line-height: 1;
  transition: transform .15s;
}
.page-icon-area:hover { transform: scale(1.08); }
.page-cover-area + .page-icon-area { margin-top: -40px; }

.page-title-input {
  font-family: var(--font-body);
  font-size: 40px;
  font-weight: 700;
  line-height: 1.2;
  border: none;
  outline: none;
  width: 100%;
  background: transparent;
  color: var(--text);
  letter-spacing: -.02em;
  resize: none;
  overflow: hidden;
}
.page-title-input::placeholder { color: var(--text-tertiary); }
.page-title-input:empty::before {
  content: attr(data-placeholder);
  color: var(--text-tertiary);
}

/* ─── BLOCKS ─── */
.block-wrapper {
  position: relative;
  margin: 2px 0;
  border-radius: var(--radius);
  transition: background .1s;
}
.block-wrapper:hover > .block-handle { opacity:1; }
.block-wrapper.dragging { opacity:.4; }
.block-wrapper.drag-over-top { box-shadow: 0 -2px 0 var(--blue); }
.block-wrapper.drag-over-bottom { box-shadow: 0 2px 0 var(--blue); }

.block-handle {
  position: absolute;
  left: -28px;
  top: 4px;
  width: 22px;
  height: 24px;
  opacity: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  border-radius: var(--radius);
  color: var(--text-tertiary);
  transition: opacity .15s, color .1s, background .1s;
  user-select: none;
}
.block-handle:hover { background: var(--sidebar-hover); color: var(--text-secondary); }
.block-handle svg { width:14px; height:14px; }

.block {
  padding: 3px 2px;
  outline: none;
  min-height: 1.65em;
  word-break: break-word;
}
.block:empty::before {
  content: attr(data-placeholder);
  color: var(--text-tertiary);
  pointer-events: none;
}

/* Block types */
.block[data-type="h1"] { font-size: 30px; font-weight: 700; line-height: 1.25; margin-top: 28px; letter-spacing: -.02em; }
.block[data-type="h2"] { font-size: 24px; font-weight: 700; line-height: 1.3; margin-top: 22px; letter-spacing: -.01em; }
.block[data-type="h3"] { font-size: 20px; font-weight: 600; line-height: 1.35; margin-top: 18px; }

.block[data-type="bullet"] { padding-left: 24px; }
.block[data-type="bullet"]::before { content:"•"; position:absolute; left:10px; color:var(--text); font-weight:700; }
.block[data-type="numbered"] { padding-left: 24px; }
.block[data-type="todo"] { padding-left: 28px; cursor: text; }
.block-wrapper:has(.block[data-type="todo"]) .todo-checkbox {
  position: absolute;
  left: 2px;
  top: 7px;
  width: 16px; height: 16px;
  border: 2px solid var(--text-secondary);
  border-radius: 3px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all .15s;
  background: transparent;
  z-index: 1;
}
.block-wrapper:has(.block[data-type="todo"]) .todo-checkbox:hover { border-color: var(--blue); }
.block-wrapper:has(.block[data-type="todo"].checked) .todo-checkbox {
  background: var(--blue);
  border-color: var(--blue);
}
.block-wrapper:has(.block[data-type="todo"].checked) .todo-checkbox::after {
  content:"✓"; color:white; font-size:11px; font-weight:700;
}
.block[data-type="todo"].checked { text-decoration: line-through; color: var(--text-secondary); }

.block[data-type="quote"] {
  border-left: 3px solid var(--text);
  padding-left: 16px;
  font-style: italic;
  color: var(--text);
}

.block[data-type="callout"] {
  background: var(--yellow-soft);
  padding: 12px 14px 12px 42px;
  border-radius: var(--radius);
  position: relative;
}
.block[data-type="callout"]::before { content:"💡"; position:absolute; left:14px; top:12px; font-style:normal; }

.block[data-type="code"] {
  font-family: var(--font-mono);
  font-size: 14px;
  background: var(--sidebar-bg);
  padding: 14px 16px;
  border-radius: var(--radius);
  white-space: pre-wrap;
  line-height: 1.55;
  border: 1px solid var(--border);
  tab-size: 2;
}

.block[data-type="divider"] {
  height: 1px;
  background: var(--border);
  margin: 14px 0;
  padding: 0;
  min-height: 0;
  pointer-events: none;
}

.block[data-type="toggle"] { padding-left: 24px; cursor: text; }
.block-wrapper:has(.block[data-type="toggle"]) .toggle-arrow {
  position: absolute;
  left: 2px;
  top: 6px;
  width: 20px; height: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  transition: background .1s;
  z-index: 1;
  font-size: 12px;
  color: var(--text-secondary);
  user-select: none;
}
.block-wrapper:has(.block[data-type="toggle"]) .toggle-arrow:hover { background: var(--sidebar-hover); }
.toggle-content {
  padding-left: 24px;
  display: none;
}
.toggle-content.open { display: block; }

/* Inline formatting */
.block b, .block strong { font-weight: 700; }
.block i, .block em { font-style: italic; }
.block u { text-decoration: underline; }
.block s, .block strike { text-decoration: line-through; }
.block code {
  font-family: var(--font-mono);
  font-size: .9em;
  background: var(--accent-soft);
  color: var(--accent);
  padding: 1px 5px;
  border-radius: 3px;
}

/* ─── SLASH MENU ─── */
#slash-menu {
  position: fixed;
  background: white;
  border: 1px solid var(--border);
  border-radius: 8px;
  box-shadow: 0 4px 24px var(--shadow-md), 0 0 0 1px var(--shadow);
  width: 280px;
  max-height: 340px;
  overflow-y: auto;
  z-index: 100;
  display: none;
  padding: 6px;
  font-family: var(--font-ui);
}
#slash-menu.visible { display:block; animation: menuIn .12s ease-out; }
@keyframes menuIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }

.slash-menu-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: .05em;
  color: var(--text-secondary);
  padding: 8px 8px 4px;
}

.slash-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 6px 8px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background .1s;
}
.slash-item:hover, .slash-item.selected { background: var(--sidebar-hover); }
.slash-item-icon {
  width: 40px; height: 40px;
  background: white;
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  flex-shrink: 0;
}
.slash-item-text { flex:1; }
.slash-item-text .name { font-size:14px; font-weight:500; color:var(--text); }
.slash-item-text .desc { font-size:12px; color:var(--text-secondary); }

/* ─── FORMAT TOOLBAR ─── */
#format-bar {
  position: fixed;
  background: var(--text);
  border-radius: 8px;
  padding: 2px 4px;
  display: none;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,.2);
  animation: menuIn .12s ease-out;
  gap: 1px;
}
#format-bar.visible { display:flex; }
.fmt-btn {
  width: 32px; height: 30px;
  border: none;
  background: none;
  color: rgba(255,255,255,.8);
  cursor: pointer;
  border-radius: 4px;
  font-size: 14px;
  font-family: var(--font-ui);
  display: grid;
  place-items: center;
  transition: background .1s, color .1s;
}
.fmt-btn:hover { background: rgba(255,255,255,.15); color: white; }
.fmt-btn.active { color: var(--blue); }
.fmt-sep { width:1px; background:rgba(255,255,255,.15); margin:4px 2px; }

/* ─── ICON PICKER ─── */
#icon-picker {
  position: fixed;
  background: white;
  border: 1px solid var(--border);
  border-radius: 10px;
  box-shadow: 0 8px 32px var(--shadow-md);
  width: 320px;
  max-height: 280px;
  overflow-y: auto;
  z-index: 110;
  display: none;
  padding: 10px;
  font-family: var(--font-ui);
}
#icon-picker.visible { display:block; animation: menuIn .15s ease-out; }
#icon-picker .emoji-grid { display:flex; flex-wrap:wrap; gap:2px; }
#icon-picker .emoji-grid span {
  width:36px; height:36px;
  display:grid; place-items:center;
  font-size:22px; cursor:pointer;
  border-radius:var(--radius);
  transition: background .1s;
}
#icon-picker .emoji-grid span:hover { background: var(--sidebar-hover); }
#icon-picker .remove-icon {
  display:block; width:100%; text-align:center;
  font-size:12px; color:var(--text-secondary);
  padding:8px 0 4px; cursor:pointer;
  border-top: 1px solid var(--border);
  margin-top:8px;
}
#icon-picker .remove-icon:hover { color:var(--accent); }

/* ─── RESPONSIVE ─── */
@media(max-width:860px) {
  #sidebar { position:fixed; left:0; top:0; bottom:0; z-index:50; }
  #sidebar.collapsed { margin-left: calc(-1 * var(--sidebar-width)); }
  #editor { padding: 30px 24px 100px; }
  .page-cover-area { margin: -30px -24px 0; }
  .block-handle { left:-24px; }
}

/* ─── EMPTY STATES ─── */
.empty-hint {
  color: var(--text-tertiary);
  font-family: var(--font-ui);
  font-size: 14px;
  padding: 4px 2px;
}
</style>
</head>
<body>

<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sidebar-header">
      <div class="sidebar-logo">
        <div class="logo-icon">B</div>
        Blocks
      </div>
      <button class="sidebar-toggle" onclick="toggleSidebar()" title="Toggle sidebar">◀</button>
    </div>
    <div class="sidebar-section-label">Pages</div>
    <div class="sidebar-pages" id="page-list"></div>
    <button class="sidebar-new-page" onclick="createNewPage()">
      <span style="font-size:18px;opacity:.6">+</span>
      New page
    </button>
    <div class="sidebar-footer">All data saved locally in your browser</div>
  </nav>

  <!-- MAIN -->
  <div id="main">
    <div id="topbar">
      <button class="topbar-toggle" onclick="toggleSidebar()" title="Open sidebar">☰</button>
      <div class="breadcrumb" id="breadcrumb"></div>
    </div>
    <div id="editor-scroll">
      <div id="editor"></div>
    </div>
  </div>
</div>

<!-- SLASH COMMAND MENU -->
<div id="slash-menu"></div>

<!-- FORMAT TOOLBAR -->
<div id="format-bar">
  <button class="fmt-btn" data-cmd="bold" title="Bold"><b>B</b></button>
  <button class="fmt-btn" data-cmd="italic" title="Italic"><i>I</i></button>
  <button class="fmt-btn" data-cmd="underline" title="Underline"><u>U</u></button>
  <button class="fmt-btn" data-cmd="strikeThrough" title="Strikethrough"><s>S</s></button>
  <div class="fmt-sep"></div>
  <button class="fmt-btn" data-cmd="code" title="Code" style="font-family:var(--font-mono);font-size:13px">&lt;/&gt;</button>
</div>

<!-- ICON PICKER -->
<div id="icon-picker"></div>

<script>
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DATA LAYER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const STORAGE_KEY = 'blocks_workspace_v2';
const EMOJIS = ['📝','📄','📋','📌','📎','📊','📈','🎯','💡','🔥','⭐','❤️','🚀','🎨','🎵','📚','🏠','💼','🌍','🔧','⚡','🌟','✨','🎉','🍀','🌊','🌸','🌺','🎪','🧩','🎲','🏆','💎','🔮','🎭','🦋','🌈','☀️','🌙','⛰️','🏖️','🛠️','📡','🔬','🧪','🎸','🎹','📷','🖊️','✏️'];

let state = loadState();
let currentPageId = null;
let slashMenuOpen = false;
let slashFilterText = '';
let slashMenuSelectedIdx = 0;
let slashTriggerBlockId = null;
let dragSrcId = null;
let numberedCounters = {};

const BLOCK_TYPES = [
  { type:'text', label:'Text', desc:'Plain text block', icon:'Aa' },
  { type:'h1', label:'Heading 1', desc:'Big section heading', icon:'H1' },
  { type:'h2', label:'Heading 2', desc:'Medium heading', icon:'H2' },
  { type:'h3', label:'Heading 3', desc:'Small heading', icon:'H3' },
  { type:'bullet', label:'Bullet List', desc:'Simple bullet point', icon:'•' },
  { type:'numbered', label:'Numbered List', desc:'Ordered list item', icon:'1.' },
  { type:'todo', label:'To-do', desc:'Checkbox item', icon:'☑' },
  { type:'toggle', label:'Toggle', desc:'Collapsible content', icon:'▶' },
  { type:'quote', label:'Quote', desc:'Block quotation', icon:'❝' },
  { type:'callout', label:'Callout', desc:'Highlighted info box', icon:'💡' },
  { type:'code', label:'Code', desc:'Code snippet', icon:'{ }' },
  { type:'divider', label:'Divider', desc:'Horizontal line', icon:'—' },
];

function defaultState() {
  const pid = uid();
  return {
    pages: [{
      id: pid, title: 'Getting Started', icon: '🚀',
      cover: null,
      blocks: [
        { id: uid(), type:'h1', content:'Welcome to Blocks' },
        { id: uid(), type:'text', content:'A local-first, serverless workspace that lives entirely in your browser. No signup, no servers — just you and your notes.' },
        { id: uid(), type:'h2', content:'Try it out' },
        { id: uid(), type:'bullet', content:'Type <code>/</code> to open the block menu' },
        { id: uid(), type:'bullet', content:'Select text for formatting options (bold, italic, code…)' },
        { id: uid(), type:'bullet', content:'Drag blocks to reorder using the ⠿ handle' },
        { id: uid(), type:'todo', content:'Create your first page using the sidebar', checked: false },
        { id: uid(), type:'todo', content:'Try changing the page icon', checked: false },
        { id: uid(), type:'divider', content:'' },
        { id: uid(), type:'callout', content:'All data is stored in your browser\'s localStorage. Nothing ever leaves your machine.' },
        { id: uid(), type:'text', content:'' },
      ]
    }],
    sidebarOpen: true
  };
}

function uid() { return Math.random().toString(36).substr(2,9); }

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch(e) {}
  return defaultState();
}

function saveState() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
}

function getPage(id) { return state.pages.find(p => p.id === id); }

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SIDEBAR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function renderSidebar() {
  const list = document.getElementById('page-list');
  list.innerHTML = state.pages.map(p => `
    <div class="page-item ${p.id===currentPageId?'active':''}" onclick="openPage('${p.id}')">
      <span class="page-icon">${p.icon||'📄'}</span>
      <span class="page-title">${escHtml(p.title||'Untitled')}</span>
      ${state.pages.length > 1 ? `<button class="page-delete" onclick="event.stopPropagation();deletePage('${p.id}')" title="Delete page">×</button>` : ''}
    </div>
  `).join('');
}

function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sb.classList.toggle('collapsed');
  state.sidebarOpen = !sb.classList.contains('collapsed');
  saveState();
}

function createNewPage() {
  const page = {
    id: uid(), title: '', icon: '📄', cover: null,
    blocks: [{ id: uid(), type:'text', content:'', placeholder:'Type / for commands…' }]
  };
  state.pages.push(page);
  saveState();
  openPage(page.id);
}

function deletePage(pid) {
  if (state.pages.length <= 1) return;
  state.pages = state.pages.filter(p => p.id !== pid);
  saveState();
  if (currentPageId === pid) openPage(state.pages[0].id);
  else renderSidebar();
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  EDITOR RENDER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openPage(pid) {
  saveCurrentPage();
  currentPageId = pid;
  renderSidebar();
  renderEditor();
  updateBreadcrumb();
  document.getElementById('editor-scroll').scrollTop = 0;
}

function renderEditor() {
  const page = getPage(currentPageId);
  if (!page) return;
  const ed = document.getElementById('editor');
  numberedCounters = {};

  let html = '';

  // Icon
  html += `<div class="page-icon-area" onclick="openIconPicker(event, '${page.id}')">${page.icon || '📄'}</div>`;

  // Title
  html += `<div class="page-title-input" contenteditable="true" data-placeholder="Untitled" id="page-title">${escHtml(page.title)}</div>`;

  // Blocks
  let numCount = 0;
  page.blocks.forEach((b,i) => {
    if (b.type === 'numbered') numCount++;
    else if (b.type !== 'numbered') numCount = 0;

    html += renderBlock(b, b.type === 'numbered' ? numCount : 0);
  });

  ed.innerHTML = html;

  // Bind title
  const titleEl = document.getElementById('page-title');
  titleEl.addEventListener('input', () => {
    page.title = titleEl.textContent;
    renderSidebar();
    updateBreadcrumb();
    scheduleSave();
  });
  titleEl.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      e.preventDefault();
      const firstBlock = ed.querySelector('.block');
      if (firstBlock) firstBlock.focus();
    }
  });

  // Bind blocks
  ed.querySelectorAll('.block[contenteditable]').forEach(el => bindBlockEvents(el));
  ed.querySelectorAll('.todo-checkbox').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const bid = el.closest('.block-wrapper').dataset.blockId;
      const block = page.blocks.find(b => b.id === bid);
      if (block) {
        block.checked = !block.checked;
        el.closest('.block-wrapper').querySelector('.block').classList.toggle('checked', block.checked);
        scheduleSave();
      }
    });
  });
  ed.querySelectorAll('.toggle-arrow').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      const wrapper = el.closest('.block-wrapper');
      const tc = wrapper.querySelector('.toggle-content');
      if (tc) {
        tc.classList.toggle('open');
        el.textContent = tc.classList.contains('open') ? '▼' : '▶';
      }
    });
  });

  // Drag and drop
  ed.querySelectorAll('.block-handle').forEach(h => {
    h.addEventListener('mousedown', (e) => {
      const w = h.closest('.block-wrapper');
      w.setAttribute('draggable','true');
    });
  });
  ed.querySelectorAll('.block-wrapper').forEach(w => {
    w.addEventListener('dragstart', onDragStart);
    w.addEventListener('dragover', onDragOver);
    w.addEventListener('dragleave', onDragLeave);
    w.addEventListener('drop', onDrop);
    w.addEventListener('dragend', onDragEnd);
  });
}

function renderBlock(b, numIdx) {
  const isDivider = b.type === 'divider';
  const isTodo = b.type === 'todo';
  const isToggle = b.type === 'toggle';
  const phMap = { text:'Type / for commands…', h1:'Heading 1', h2:'Heading 2', h3:'Heading 3', bullet:'List item', numbered:'List item', todo:'To-do', quote:'Quote', callout:'Type here…', code:'Code', toggle:'Toggle' };
  const ph = phMap[b.type] || '';

  let inner = '';
  if (isDivider) {
    inner = `<div class="block" data-type="divider"></div>`;
  } else {
    if (isTodo) inner += `<div class="todo-checkbox ${b.checked?'checked':''}">${b.checked?'':''}  </div>`;
    if (isToggle) inner += `<div class="toggle-arrow">▶</div>`;
    if (b.type === 'numbered') {
      inner += `<div class="block" data-type="${b.type}" contenteditable="true" data-placeholder="${ph}" style="padding-left:24px; position:relative;">${b.content||''}</div>`;
      inner = `<span style="position:absolute;left:2px;top:3px;font-family:var(--font-ui);font-size:15px;color:var(--text-secondary);pointer-events:none;width:20px;text-align:right;">${numIdx}.</span>` + inner;
    } else {
      inner += `<div class="block ${isTodo && b.checked ? 'checked':''}" data-type="${b.type}" ${isDivider?'':'contenteditable="true"'} data-placeholder="${ph}">${b.content||''}</div>`;
    }
    if (isToggle) {
      inner += `<div class="toggle-content"><div class="block" contenteditable="true" data-placeholder="Empty toggle" data-type="text" style="padding-left:24px;color:var(--text-secondary);">${b.toggleContent||''}</div></div>`;
    }
  }

  return `<div class="block-wrapper" data-block-id="${b.id}" draggable="false">
    <div class="block-handle" title="Drag to reorder"><svg viewBox="0 0 10 16" fill="currentColor"><circle cx="3" cy="2" r="1.2"/><circle cx="7" cy="2" r="1.2"/><circle cx="3" cy="6" r="1.2"/><circle cx="7" cy="6" r="1.2"/><circle cx="3" cy="10" r="1.2"/><circle cx="7" cy="10" r="1.2"/><circle cx="3" cy="14" r="1.2"/><circle cx="7" cy="14" r="1.2"/></svg></div>
    ${inner}
  </div>`;
}

function bindBlockEvents(el) {
  el.addEventListener('input', onBlockInput);
  el.addEventListener('keydown', onBlockKeydown);
  el.addEventListener('focus', onBlockFocus);
  el.addEventListener('paste', onBlockPaste);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  BLOCK EVENTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let saveTimer;
function scheduleSave() { clearTimeout(saveTimer); saveTimer = setTimeout(() => { saveCurrentPage(); saveState(); }, 400); }

function saveCurrentPage() {
  const page = getPage(currentPageId);
  if (!page) return;
  const ed = document.getElementById('editor');
  const wrappers = ed.querySelectorAll('.block-wrapper');
  page.blocks = [];
  wrappers.forEach(w => {
    const bid = w.dataset.blockId;
    const blockEl = w.querySelector('.block');
    if (!blockEl) return;
    const type = blockEl.dataset.type;
    const b = { id: bid, type, content: blockEl.innerHTML };
    if (type === 'todo') {
      b.checked = blockEl.classList.contains('checked');
    }
    if (type === 'toggle') {
      const tc = w.querySelector('.toggle-content .block');
      b.toggleContent = tc ? tc.innerHTML : '';
    }
    page.blocks.push(b);
  });
}

function onBlockInput(e) {
  const el = e.target;
  const text = el.textContent;

  // Slash command trigger
  if (text === '/') {
    openSlashMenu(el);
    return;
  }

  // Auto-detect slash in text
  const sel = window.getSelection();
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    const textBefore = getTextBeforeCursor(range);
    if (textBefore && textBefore.endsWith('/') && !slashMenuOpen) {
      // Check if this is a fresh slash at end
      slashTriggerBlockId = el.closest('.block-wrapper').dataset.blockId;
      slashFilterText = '';
      showSlashMenu(el);
    } else if (slashMenuOpen) {
      const slashIdx = textBefore ? textBefore.lastIndexOf('/') : -1;
      if (slashIdx >= 0) {
        slashFilterText = textBefore.substring(slashIdx + 1);
        filterSlashMenu();
      } else {
        closeSlashMenu();
      }
    }
  }

  scheduleSave();
}

function getTextBeforeCursor(range) {
  const r = range.cloneRange();
  r.selectNodeContents(range.startContainer.closest ? range.startContainer.closest('.block') || range.startContainer.parentElement : range.startContainer.parentElement);
  r.setEnd(range.startContainer, range.startOffset);
  return r.toString();
}

function onBlockKeydown(e) {
  const el = e.target;

  // Slash menu navigation
  if (slashMenuOpen) {
    if (e.key === 'ArrowDown') { e.preventDefault(); navigateSlashMenu(1); return; }
    if (e.key === 'ArrowUp') { e.preventDefault(); navigateSlashMenu(-1); return; }
    if (e.key === 'Enter') { e.preventDefault(); selectSlashItem(); return; }
    if (e.key === 'Escape') { closeSlashMenu(); return; }
  }

  // Enter: create new block
  if (e.key === 'Enter' && !e.shiftKey) {
    if (el.dataset.type === 'code') return; // allow multiline in code
    e.preventDefault();

    // Split content at cursor
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    range.deleteContents();

    const afterRange = document.createRange();
    afterRange.setStart(range.endContainer, range.endOffset);
    afterRange.setEndAfter(el.lastChild || el);
    const afterFrag = afterRange.extractContents();
    const tempDiv = document.createElement('div');
    tempDiv.appendChild(afterFrag);
    const afterHtml = tempDiv.innerHTML;

    const wrapper = el.closest('.block-wrapper');
    const newType = ['bullet','numbered','todo'].includes(el.dataset.type) ? el.dataset.type : 'text';
    const newBlock = { id: uid(), type: newType, content: afterHtml };
    if (newType === 'todo') newBlock.checked = false;

    const newHtml = renderBlock(newBlock, 0);
    wrapper.insertAdjacentHTML('afterend', newHtml);
    const newWrapper = wrapper.nextElementSibling;
    const newBlockEl = newWrapper.querySelector('.block[contenteditable]');
    if (newBlockEl) {
      bindBlockEvents(newBlockEl);
      newBlockEl.focus();
      // place cursor at start
      const r = document.createRange();
      r.selectNodeContents(newBlockEl);
      r.collapse(true);
      sel.removeAllRanges();
      sel.addRange(r);
    }

    // Bind todo checkbox
    newWrapper.querySelectorAll('.todo-checkbox').forEach(cb => {
      cb.addEventListener('click', (ev) => {
        ev.stopPropagation();
        const page = getPage(currentPageId);
        const bid = newWrapper.dataset.blockId;
        const block = page.blocks.find(b => b.id === bid);
        if (block) {
          block.checked = !block.checked;
          newWrapper.querySelector('.block').classList.toggle('checked', block.checked);
          cb.classList.toggle('checked', block.checked);
          scheduleSave();
        }
      });
    });

    // Re-number if needed
    renumberBlocks();
    scheduleSave();
    return;
  }

  // Backspace at start: merge with above or convert to text
  if (e.key === 'Backspace') {
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    if (range.startOffset === 0 && range.collapsed) {
      const wrapper = el.closest('.block-wrapper');
      const prevWrapper = wrapper.previousElementSibling;
      if (el.dataset.type !== 'text' && el.textContent === '') {
        // Convert to text
        e.preventDefault();
        changeBlockType(wrapper, 'text');
        return;
      }
      if (prevWrapper && prevWrapper.classList.contains('block-wrapper')) {
        e.preventDefault();
        const prevBlock = prevWrapper.querySelector('.block[contenteditable]');
        if (prevBlock) {
          const prevLen = prevBlock.textContent.length;
          prevBlock.innerHTML += el.innerHTML;
          wrapper.remove();
          // Place cursor at join point
          placeCaretAt(prevBlock, prevLen);
          renumberBlocks();
          scheduleSave();
        }
      }
    }
  }

  // Arrow up/down between blocks
  if (e.key === 'ArrowUp') {
    const wrapper = el.closest('.block-wrapper');
    const prev = wrapper.previousElementSibling;
    if (prev && prev.classList.contains('block-wrapper')) {
      const prevBlock = prev.querySelector('.block[contenteditable]');
      if (prevBlock && isCaretAtTop(el)) {
        e.preventDefault();
        prevBlock.focus();
        placeCaretAtEnd(prevBlock);
      }
    }
  }
  if (e.key === 'ArrowDown') {
    const wrapper = el.closest('.block-wrapper');
    const next = wrapper.nextElementSibling;
    if (next && next.classList.contains('block-wrapper')) {
      const nextBlock = next.querySelector('.block[contenteditable]');
      if (nextBlock && isCaretAtBottom(el)) {
        e.preventDefault();
        nextBlock.focus();
        placeCaretAt(nextBlock, 0);
      }
    }
  }

  // Tab: indent (placeholder — converts bullet to text or vice versa for now)
  if (e.key === 'Tab') {
    if (el.dataset.type === 'code') {
      e.preventDefault();
      document.execCommand('insertText', false, '  ');
      return;
    }
    e.preventDefault();
  }
}

function onBlockFocus(e) {
  // Close icon picker if open
}

function onBlockPaste(e) {
  e.preventDefault();
  const text = (e.clipboardData || window.clipboardData).getData('text/plain');
  document.execCommand('insertText', false, text);
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  BLOCK OPERATIONS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function changeBlockType(wrapper, newType) {
  const oldBlock = wrapper.querySelector('.block');
  const content = oldBlock ? oldBlock.innerHTML : '';
  const bid = wrapper.dataset.blockId;
  const b = { id: bid, type: newType, content: content };
  if (newType === 'todo') b.checked = false;
  wrapper.outerHTML = renderBlock(b, 0);

  // Re-bind
  const newWrapper = document.querySelector(`[data-block-id="${bid}"]`);
  if (newWrapper) {
    const newBlock = newWrapper.querySelector('.block[contenteditable]');
    if (newBlock) {
      bindBlockEvents(newBlock);
      newBlock.focus();
      placeCaretAtEnd(newBlock);
    }
    newWrapper.querySelectorAll('.todo-checkbox').forEach(cb => {
      cb.addEventListener('click', () => {
        const page = getPage(currentPageId);
        const block = page.blocks.find(bl => bl.id === bid);
        if (block) { block.checked = !block.checked; }
        newWrapper.querySelector('.block').classList.toggle('checked');
        cb.classList.toggle('checked');
        scheduleSave();
      });
    });
    newWrapper.querySelectorAll('.toggle-arrow').forEach(ta => {
      ta.addEventListener('click', () => {
        const tc = newWrapper.querySelector('.toggle-content');
        if (tc) { tc.classList.toggle('open'); ta.textContent = tc.classList.contains('open') ? '▼' : '▶'; }
      });
    });
    // Drag
    const handle = newWrapper.querySelector('.block-handle');
    if (handle) handle.addEventListener('mousedown', () => newWrapper.setAttribute('draggable','true'));
    newWrapper.addEventListener('dragstart', onDragStart);
    newWrapper.addEventListener('dragover', onDragOver);
    newWrapper.addEventListener('dragleave', onDragLeave);
    newWrapper.addEventListener('drop', onDrop);
    newWrapper.addEventListener('dragend', onDragEnd);
  }

  renumberBlocks();
  scheduleSave();
}

function renumberBlocks() {
  const ed = document.getElementById('editor');
  let count = 0;
  ed.querySelectorAll('.block-wrapper').forEach(w => {
    const b = w.querySelector('.block');
    if (!b) return;
    if (b.dataset.type === 'numbered') {
      count++;
      const numSpan = w.querySelector('span[style*="pointer-events"]');
      if (numSpan) numSpan.textContent = count + '.';
    } else {
      count = 0;
    }
  });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  SLASH MENU
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openSlashMenu(el) {
  slashTriggerBlockId = el.closest('.block-wrapper').dataset.blockId;
  slashFilterText = '';
  showSlashMenu(el);
}

function showSlashMenu(el) {
  const menu = document.getElementById('slash-menu');
  const rect = el.getBoundingClientRect();
  const sel = window.getSelection();
  let left = rect.left, top = rect.bottom + 4;

  if (sel.rangeCount) {
    const r = sel.getRangeAt(0).getBoundingClientRect();
    if (r.width || r.height) { left = r.left; top = r.bottom + 4; }
  }

  // Keep in viewport
  if (left + 280 > window.innerWidth) left = window.innerWidth - 290;
  if (top + 340 > window.innerHeight) top = rect.top - 344;

  menu.style.left = left + 'px';
  menu.style.top = top + 'px';

  slashMenuOpen = true;
  slashMenuSelectedIdx = 0;
  filterSlashMenu();
  menu.classList.add('visible');
}

function filterSlashMenu() {
  const menu = document.getElementById('slash-menu');
  const filter = slashFilterText.toLowerCase();
  const items = BLOCK_TYPES.filter(t => t.label.toLowerCase().includes(filter) || t.type.includes(filter));

  if (items.length === 0) {
    menu.innerHTML = '<div style="padding:12px;color:var(--text-secondary);font-size:13px;">No results</div>';
    return;
  }

  slashMenuSelectedIdx = Math.min(slashMenuSelectedIdx, items.length - 1);

  menu.innerHTML = '<div class="slash-menu-label">Blocks</div>' +
    items.map((t,i) => `
      <div class="slash-item ${i===slashMenuSelectedIdx?'selected':''}" data-type="${t.type}" onmouseenter="slashMenuSelectedIdx=${i};highlightSlashItem()" onclick="selectSlashItemByType('${t.type}')">
        <div class="slash-item-icon" style="font-family:var(--font-ui);font-size:14px;font-weight:600;">${t.icon}</div>
        <div class="slash-item-text">
          <div class="name">${t.label}</div>
          <div class="desc">${t.desc}</div>
        </div>
      </div>
    `).join('');
}

function highlightSlashItem() {
  document.querySelectorAll('.slash-item').forEach((el,i) => el.classList.toggle('selected', i===slashMenuSelectedIdx));
}

function navigateSlashMenu(dir) {
  const items = document.querySelectorAll('.slash-item');
  slashMenuSelectedIdx = (slashMenuSelectedIdx + dir + items.length) % items.length;
  highlightSlashItem();
  items[slashMenuSelectedIdx]?.scrollIntoView({ block:'nearest' });
}

function selectSlashItem() {
  const items = document.querySelectorAll('.slash-item');
  if (items[slashMenuSelectedIdx]) {
    const type = items[slashMenuSelectedIdx].dataset.type;
    selectSlashItemByType(type);
  }
}

function selectSlashItemByType(type) {
  closeSlashMenu();
  const wrapper = document.querySelector(`[data-block-id="${slashTriggerBlockId}"]`);
  if (!wrapper) return;
  const block = wrapper.querySelector('.block');
  if (!block) return;

  // Remove the slash command text
  let html = block.innerHTML;
  const slashIdx = html.lastIndexOf('/');
  if (slashIdx >= 0) {
    html = html.substring(0, slashIdx);
  }
  block.innerHTML = html;

  if (type === 'divider') {
    // Insert divider after current block
    const newB = { id: uid(), type:'divider', content:'' };
    const newHtml = renderBlock(newB, 0);
    wrapper.insertAdjacentHTML('afterend', newHtml);
    // Also add an empty text block after divider
    const textB = { id: uid(), type:'text', content:'' };
    wrapper.nextElementSibling.insertAdjacentHTML('afterend', renderBlock(textB, 0));
    const textEl = wrapper.nextElementSibling.nextElementSibling.querySelector('.block[contenteditable]');
    if (textEl) { bindBlockEvents(textEl); textEl.focus(); }
    scheduleSave();
    return;
  }

  changeBlockType(wrapper, type);
}

function closeSlashMenu() {
  slashMenuOpen = false;
  document.getElementById('slash-menu').classList.remove('visible');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  FORMAT TOOLBAR
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('selectionchange', () => {
  const sel = window.getSelection();
  const bar = document.getElementById('format-bar');

  if (!sel.rangeCount || sel.isCollapsed) {
    bar.classList.remove('visible');
    return;
  }

  const range = sel.getRangeAt(0);
  const parent = range.commonAncestorContainer;
  const block = parent.closest ? parent.closest('.block') : parent.parentElement?.closest('.block');
  if (!block || block.dataset.type === 'code') {
    bar.classList.remove('visible');
    return;
  }

  const rect = range.getBoundingClientRect();
  if (rect.width < 2) { bar.classList.remove('visible'); return; }

  bar.style.left = (rect.left + rect.width/2 - 90) + 'px';
  bar.style.top = (rect.top - 40) + 'px';
  bar.classList.add('visible');

  // Update active states
  bar.querySelectorAll('.fmt-btn[data-cmd]').forEach(btn => {
    const cmd = btn.dataset.cmd;
    if (cmd === 'code') return;
    btn.classList.toggle('active', document.queryCommandState(cmd));
  });
});

document.getElementById('format-bar').addEventListener('mousedown', (e) => {
  e.preventDefault(); // Keep selection
  const btn = e.target.closest('.fmt-btn');
  if (!btn) return;
  const cmd = btn.dataset.cmd;

  if (cmd === 'code') {
    // Wrap in <code> tags
    const sel = window.getSelection();
    if (!sel.rangeCount) return;
    const range = sel.getRangeAt(0);
    const text = range.toString();
    range.deleteContents();
    const code = document.createElement('code');
    code.textContent = text;
    range.insertNode(code);
    sel.removeAllRanges();
    const r = document.createRange();
    r.selectNodeContents(code);
    sel.addRange(r);
  } else {
    document.execCommand(cmd, false, null);
  }
  scheduleSave();
});

// Close format bar on click outside
document.addEventListener('mousedown', (e) => {
  if (!e.target.closest('#format-bar')) {
    // Will close via selectionchange
  }
  if (!e.target.closest('#slash-menu') && !e.target.closest('.block')) {
    closeSlashMenu();
  }
  if (!e.target.closest('#icon-picker') && !e.target.closest('.page-icon-area')) {
    document.getElementById('icon-picker').classList.remove('visible');
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  ICON PICKER
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function openIconPicker(e, pageId) {
  const picker = document.getElementById('icon-picker');
  const rect = e.target.getBoundingClientRect();
  picker.style.left = rect.left + 'px';
  picker.style.top = (rect.bottom + 4) + 'px';

  picker.innerHTML = `
    <div class="emoji-grid">
      ${EMOJIS.map(em => `<span onclick="setPageIcon('${pageId}','${em}')">${em}</span>`).join('')}
    </div>
    <div class="remove-icon" onclick="setPageIcon('${pageId}','')">Remove icon</div>
  `;
  picker.classList.add('visible');
}

function setPageIcon(pageId, icon) {
  const page = getPage(pageId);
  if (page) {
    page.icon = icon || '📄';
    saveState();
    renderEditor();
    renderSidebar();
  }
  document.getElementById('icon-picker').classList.remove('visible');
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  DRAG & DROP
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function onDragStart(e) {
  const w = e.target.closest('.block-wrapper');
  if (!w) return;
  dragSrcId = w.dataset.blockId;
  w.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('text/plain', dragSrcId);
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  const w = e.target.closest('.block-wrapper');
  if (!w || w.dataset.blockId === dragSrcId) return;

  // Clear other indicators
  document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));

  const rect = w.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  if (e.clientY < mid) w.classList.add('drag-over-top');
  else w.classList.add('drag-over-bottom');
}

function onDragLeave(e) {
  const w = e.target.closest('.block-wrapper');
  if (w) { w.classList.remove('drag-over-top','drag-over-bottom'); }
}

function onDrop(e) {
  e.preventDefault();
  const w = e.target.closest('.block-wrapper');
  if (!w || w.dataset.blockId === dragSrcId) return;

  const srcEl = document.querySelector(`[data-block-id="${dragSrcId}"]`);
  if (!srcEl) return;

  const rect = w.getBoundingClientRect();
  const mid = rect.top + rect.height / 2;
  if (e.clientY < mid) w.before(srcEl);
  else w.after(srcEl);

  document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
  renumberBlocks();
  scheduleSave();
}

function onDragEnd(e) {
  const w = e.target.closest('.block-wrapper');
  if (w) { w.classList.remove('dragging'); w.setAttribute('draggable','false'); }
  dragSrcId = null;
  document.querySelectorAll('.drag-over-top,.drag-over-bottom').forEach(el => el.classList.remove('drag-over-top','drag-over-bottom'));
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  UTILITIES
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function escHtml(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

function placeCaretAtEnd(el) {
  el.focus();
  const sel = window.getSelection();
  const range = document.createRange();
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function placeCaretAt(el, offset) {
  el.focus();
  const sel = window.getSelection();
  const range = document.createRange();

  // Walk text nodes to find the right position
  let charCount = 0;
  const walker = document.createTreeWalker(el, NodeFilter.SHOW_TEXT, null, false);
  let node;
  while (node = walker.nextNode()) {
    const len = node.textContent.length;
    if (charCount + len >= offset) {
      range.setStart(node, offset - charCount);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
      return;
    }
    charCount += len;
  }
  // Fallback: place at end
  range.selectNodeContents(el);
  range.collapse(false);
  sel.removeAllRanges();
  sel.addRange(range);
}

function isCaretAtTop(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return false;
  const range = sel.getRangeAt(0);
  const preRange = document.createRange();
  preRange.selectNodeContents(el);
  preRange.setEnd(range.startContainer, range.startOffset);
  const text = preRange.toString();
  return !text.includes('\n') && range.startOffset <= (text.length);
}

function isCaretAtBottom(el) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return false;
  const range = sel.getRangeAt(0);
  const postRange = document.createRange();
  postRange.setStart(range.endContainer, range.endOffset);
  postRange.setEndAfter(el.lastChild || el);
  const text = postRange.toString();
  return !text.includes('\n');
}

function updateBreadcrumb() {
  const page = getPage(currentPageId);
  if (!page) return;
  document.getElementById('breadcrumb').innerHTML = `
    <span>${page.icon||'📄'}</span>
    <span>${escHtml(page.title||'Untitled')}</span>
  `;
}

// Topbar shadow on scroll
document.getElementById('editor-scroll').addEventListener('scroll', (e) => {
  document.getElementById('topbar').classList.toggle('scrolled', e.target.scrollTop > 4);
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  KEYBOARD SHORTCUTS
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
document.addEventListener('keydown', (e) => {
  // Ctrl/Cmd + B/I/U handled by contenteditable
  // Ctrl/Cmd + N: new page
  if ((e.ctrlKey || e.metaKey) && e.key === 'n') {
    e.preventDefault();
    createNewPage();
  }
  // Ctrl/Cmd + \\: toggle sidebar
  if ((e.ctrlKey || e.metaKey) && e.key === '\\') {
    e.preventDefault();
    toggleSidebar();
  }
});

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
//  INIT
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function init() {
  if (!state.sidebarOpen) document.getElementById('sidebar').classList.add('collapsed');
  if (state.pages.length === 0) {
    state = defaultState();
    saveState();
  }
  currentPageId = state.pages[0].id;
  renderSidebar();
  renderEditor();
  updateBreadcrumb();
}

init();
</script>
