<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Azure AI HTML Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --surface: #111114;
    --surface-2: #18181c;
    --border: #2a2a30;
    --border-focus: #4a6cf7;
    --text: #e8e8ec;
    --text-dim: #7a7a88;
    --accent: #4a6cf7;
    --accent-glow: rgba(74, 108, 247, 0.15);
    --success: #34d399;
    --error: #f87171;
    --warning: #fbbf24;
    --radius: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'JetBrains Mono', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Ambient background */
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background: radial-gradient(ellipse at 30% 20%, rgba(74, 108, 247, 0.04) 0%, transparent 50%),
                radial-gradient(ellipse at 70% 80%, rgba(139, 92, 246, 0.03) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 1100px; margin: 0 auto; padding: 40px 24px 60px; }

  /* Header */
  header { margin-bottom: 48px; }
  header h1 {
    font-family: 'Instrument Serif', serif;
    font-size: 2.8rem;
    font-weight: 400;
    letter-spacing: -0.02em;
    background: linear-gradient(135deg, #e8e8ec 0%, #7a7a88 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  header p { font-size: 0.8rem; color: var(--text-dim); font-weight: 300; letter-spacing: 0.05em; text-transform: uppercase; }

  /* Config Bar */
  .config-bar {
    display: grid;
    grid-template-columns: 1fr 1fr auto;
    gap: 12px;
    margin-bottom: 32px;
    padding: 20px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
  }
  .config-bar label {
    display: block;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    margin-bottom: 6px;
  }
  .config-bar input, .config-bar select {
    width: 100%;
    padding: 10px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    transition: border-color 0.2s;
  }
  .config-bar input:focus, .config-bar select:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .config-bar input[type="password"] { letter-spacing: 0.15em; }

  .save-btn {
    align-self: end;
    padding: 10px 20px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }
  .save-btn:hover { border-color: var(--accent); background: var(--accent-glow); }

  /* Main Layout */
  .workspace { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }
  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 18px;
    border-bottom: 1px solid var(--border);
    background: var(--surface-2);
  }
  .panel-title {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .panel-title .dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent);
  }
  .panel-body { padding: 18px; flex: 1; }

  /* Drop Zone */
  .drop-zone {
    border: 2px dashed var(--border);
    border-radius: 8px;
    padding: 40px 20px;
    text-align: center;
    cursor: pointer;
    transition: all 0.3s;
    min-height: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    position: relative;
  }
  .drop-zone:hover, .drop-zone.dragover {
    border-color: var(--accent);
    background: var(--accent-glow);
  }
  .drop-zone.loaded { border-color: var(--success); border-style: solid; }
  .drop-zone .icon { font-size: 2rem; opacity: 0.4; }
  .drop-zone .label { font-size: 0.8rem; color: var(--text-dim); }
  .drop-zone .filename {
    font-size: 0.85rem;
    color: var(--success);
    font-weight: 500;
    word-break: break-all;
  }
  .drop-zone .filesize { font-size: 0.7rem; color: var(--text-dim); }
  .drop-zone input[type="file"] { display: none; }

  /* Code Preview */
  .code-preview {
    margin-top: 12px;
    max-height: 200px;
    overflow: auto;
    background: var(--bg);
    border-radius: 6px;
    padding: 12px;
    font-size: 0.7rem;
    line-height: 1.6;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  /* Query Box */
  .query-area {
    width: 100%;
    min-height: 260px;
    padding: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.82rem;
    line-height: 1.7;
    resize: vertical;
    transition: border-color 0.2s;
  }
  .query-area:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .query-area::placeholder { color: var(--text-dim); opacity: 0.5; }

  /* Action Bar */
  .action-bar {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .send-btn {
    flex: 1;
    padding: 16px 32px;
    background: var(--accent);
    border: none;
    border-radius: var(--radius);
    color: #fff;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.85rem;
    font-weight: 600;
    letter-spacing: 0.05em;
    cursor: pointer;
    transition: all 0.3s;
    position: relative;
    overflow: hidden;
  }
  .send-btn:hover:not(:disabled) { filter: brightness(1.15); transform: translateY(-1px); box-shadow: 0 6px 24px rgba(74, 108, 247, 0.3); }
  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn.processing {
    background: linear-gradient(90deg, var(--accent), #8b5cf6, var(--accent));
    background-size: 200% 100%;
    animation: shimmer 1.5s infinite;
  }
  @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

  .model-select {
    padding: 16px 14px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    cursor: pointer;
  }
  .model-select:focus { outline: none; border-color: var(--accent); }

  /* Output Section */
  .output-section { margin-top: 24px; }
  .output-section .panel { min-height: 200px; }

  .output-tabs {
    display: flex;
    gap: 0;
  }
  .output-tab {
    padding: 8px 16px;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--text-dim);
    cursor: pointer;
    border: none;
    background: none;
    font-family: 'JetBrains Mono', monospace;
    transition: color 0.2s;
    border-bottom: 2px solid transparent;
  }
  .output-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .output-tab:hover { color: var(--text); }

  .output-preview {
    width: 100%;
    min-height: 400px;
    border: none;
    background: #fff;
    border-radius: 6px;
  }
  .output-code {
    min-height: 400px;
    max-height: 600px;
    overflow: auto;
    background: var(--bg);
    border-radius: 6px;
    padding: 16px;
    font-size: 0.75rem;
    line-height: 1.7;
    color: var(--text-dim);
    white-space: pre-wrap;
    word-break: break-all;
  }

  .output-actions {
    display: flex; gap: 8px;
  }
  .out-btn {
    padding: 6px 14px;
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.68rem;
    cursor: pointer;
    transition: all 0.2s;
  }
  .out-btn:hover { border-color: var(--accent); }

  /* Status */
  .status-bar {
    margin-top: 16px;
    padding: 12px 16px;
    border-radius: 8px;
    font-size: 0.75rem;
    display: none;
  }
  .status-bar.visible { display: flex; align-items: flex-start; gap: 10px; flex-wrap: wrap; word-break: break-word; }
  .status-bar.info { background: var(--accent-glow); color: var(--accent); border: 1px solid rgba(74,108,247,0.2); }
  .status-bar.success { background: rgba(52,211,153,0.08); color: var(--success); border: 1px solid rgba(52,211,153,0.2); }
  .status-bar.error { background: rgba(248,113,113,0.08); color: var(--error); border: 1px solid rgba(248,113,113,0.2); }

  .spinner {
    width: 14px; height: 14px;
    border: 2px solid transparent;
    border-top-color: currentColor;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Token Counter */
  .token-info {
    font-size: 0.65rem;
    color: var(--text-dim);
    text-align: right;
    padding: 6px 0;
  }

  /* Responsive */
  @media (max-width: 768px) {
    .workspace { grid-template-columns: 1fr; }
    .config-bar { grid-template-columns: 1fr; }
    header h1 { font-size: 2rem; }
    .action-bar { flex-direction: column; }
    .send-btn, .model-select { width: 100%; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

  .hidden { display: none !important; }

  /* System prompt toggle */
  .sys-toggle {
    display: flex; align-items: center; gap: 8px;
    margin-bottom: 12px;
    cursor: pointer;
    font-size: 0.7rem;
    color: var(--text-dim);
    user-select: none;
  }
  .sys-toggle:hover { color: var(--text); }
  .sys-prompt {
    width: 100%;
    min-height: 80px;
    padding: 12px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    line-height: 1.6;
    resize: vertical;
    margin-bottom: 12px;
    transition: border-color 0.2s;
  }
  .sys-prompt:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow); }
</style>
</head>
<body>
<div class="app">

  <header>
    <h1>Azure AI — HTML Workshop</h1>
    <p>Upload HTML &middot; Describe changes &middot; Get transformed output</p>
  </header>

  <!-- Config -->
  <div class="config-bar">
    <div>
      <label>Azure Endpoint</label>
      <input type="text" id="endpoint" placeholder="https://your-resource.openai.azure.com" spellcheck="false">
    </div>
    <div>
      <label>API Key</label>
      <input type="password" id="apiKey" placeholder="••••••••••••••••••">
    </div>
    <div style="display:flex; flex-direction:column; gap:6px; align-self:end;">
      <button class="save-btn" onclick="saveConfig()">Save Config</button>
      <button class="save-btn" onclick="fetchDeployments()" style="font-size:0.65rem; opacity:0.7;">Fetch Deployments</button>
    </div>
  </div>

  <!-- Workspace -->
  <div class="workspace">

    <!-- Left: File Input -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="dot"></span> Source HTML</span>
        <span id="fileMeta" style="font-size:0.65rem; color:var(--text-dim);"></span>
      </div>
      <div class="panel-body">
        <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
          <input type="file" id="fileInput" accept=".html,.htm,.svg,.xml">
          <div class="icon">◇</div>
          <div class="label">Drop HTML file here or click to browse</div>
        </div>
        <div class="code-preview hidden" id="codePreview"></div>
      </div>
    </div>

    <!-- Right: Query -->
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="dot" style="background:var(--warning)"></span> Instructions</span>
        <div class="token-info" id="tokenEstimate"></div>
      </div>
      <div class="panel-body">
        <div class="sys-toggle" onclick="toggleSysPrompt()">
          <span id="sysArrow">▸</span> System Prompt (optional)
        </div>
        <textarea class="sys-prompt hidden" id="sysPrompt" placeholder="Custom system prompt override...">You are an expert HTML developer. The user will provide an HTML file and instructions for modifying it. Return ONLY the complete modified HTML file — no explanations, no markdown fences, no commentary. Output must start with &lt;!DOCTYPE html&gt; or &lt;html&gt; and be valid HTML.</textarea>
        <textarea class="query-area" id="queryInput" placeholder="Describe what you want changed...&#10;&#10;Examples:&#10;• Add a dark mode toggle in the top-right corner&#10;• Convert all tables to responsive card layouts&#10;• Update the color scheme to match our brand (#1a3a5c)&#10;• Add interactive charts using Chart.js for the data tables"></textarea>
      </div>
    </div>
  </div>

  <!-- Action Bar -->
  <div class="action-bar">
    <select class="model-select" id="modelSelect">
      <option value="">— Deployment Name —</option>
    </select>
    <input type="text" id="deploymentInput" placeholder="Or type deployment name" style="flex:1; padding:16px 14px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); color:var(--text); font-family:'JetBrains Mono',monospace; font-size:0.8rem;">
    <select class="model-select" id="apiVersion" style="min-width:160px;">
      <option value="2025-03-01-preview">2025-03-01-preview</option>
      <option value="2025-01-01-preview">2025-01-01-preview</option>
      <option value="2024-12-01-preview">2024-12-01-preview</option>
      <option value="2024-10-21">2024-10-21</option>
      <option value="2024-08-01-preview">2024-08-01-preview</option>
      <option value="2024-06-01">2024-06-01</option>
      <option value="2024-02-01">2024-02-01</option>
      <option value="2023-05-15">2023-05-15</option>
    </select>
    <button class="send-btn" id="sendBtn" onclick="sendToAzure()" disabled>Send to Azure AI</button>
  </div>

  <!-- Status -->
  <div class="status-bar" id="statusBar">
    <div class="spinner"></div>
    <span id="statusText"></span>
  </div>

  <!-- Output -->
  <div class="output-section hidden" id="outputSection">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title"><span class="dot" style="background:var(--success)"></span> Output</span>
        <div style="display:flex; align-items:center; gap:12px;">
          <div class="output-tabs">
            <button class="output-tab active" onclick="showTab('preview')">Preview</button>
            <button class="output-tab" onclick="showTab('code')">Code</button>
          </div>
          <div class="output-actions">
            <button class="out-btn" onclick="downloadOutput()">↓ Download</button>
            <button class="out-btn" onclick="copyOutput()">⎘ Copy</button>
            <button class="out-btn" onclick="feedBack()">↻ Iterate</button>
          </div>
        </div>
      </div>
      <div class="panel-body">
        <iframe class="output-preview" id="outputPreview" sandbox="allow-scripts allow-same-origin"></iframe>
        <div class="output-code hidden" id="outputCode"></div>
      </div>
    </div>
  </div>

</div>

<script>
// State
let sourceHTML = '';
let outputHTML = '';
let fileName = 'output.html';

// Init
(function init() {
  const saved = JSON.parse(localStorage.getItem('azureHTMLConfig') || '{}');
  if (saved.endpoint) document.getElementById('endpoint').value = saved.endpoint;
  if (saved.apiKey) document.getElementById('apiKey').value = saved.apiKey;
  if (saved.deployment) document.getElementById('deploymentInput').value = saved.deployment;
  if (saved.apiVersion) document.getElementById('apiVersion').value = saved.apiVersion;
  if (saved.sysPrompt) document.getElementById('sysPrompt').value = saved.sysPrompt;
  if (saved.deployments) populateDeployments(saved.deployments);
  updateSendState();
})();

function saveConfig() {
  const config = {
    endpoint: document.getElementById('endpoint').value.trim().replace(/\/+$/, ''),
    apiKey: document.getElementById('apiKey').value.trim(),
    deployment: document.getElementById('deploymentInput').value.trim(),
    apiVersion: document.getElementById('apiVersion').value,
    sysPrompt: document.getElementById('sysPrompt').value,
  };
  localStorage.setItem('azureHTMLConfig', JSON.stringify(config));
  showStatus('Config saved locally', 'success');
  // Don't auto-list deployments — user can click "Fetch Deployments" if they want
}

async function fetchDeployments() {
  const endpoint = document.getElementById('endpoint').value.trim().replace(/\/+$/, '');
  const apiKey = document.getElementById('apiKey').value.trim();
  const apiVersion = document.getElementById('apiVersion').value;
  if (!endpoint || !apiKey) {
    showStatus('Enter endpoint and API key first', 'error');
    return;
  }
  showStatus('Fetching deployments…', 'info');
  try {
    const res = await fetch(`${endpoint}/openai/deployments?api-version=${apiVersion}`, {
      headers: { 'api-key': apiKey }
    });
    if (!res.ok) {
      const errBody = await res.text();
      console.error('Deployment list error:', res.status, errBody);
      showStatus(`Could not list deployments (HTTP ${res.status}). Type your deployment name manually instead.`, 'error');
      return;
    }
    const data = await res.json();
    const deployments = (data.data || []).map(d => d.id);
    if (deployments.length === 0) {
      showStatus('No deployments found. Type your deployment name manually.', 'error');
      return;
    }
    populateDeployments(deployments);
    const c = JSON.parse(localStorage.getItem('azureHTMLConfig') || '{}');
    c.deployments = deployments;
    localStorage.setItem('azureHTMLConfig', JSON.stringify(c));
    showStatus(`Found ${deployments.length} deployment(s)`, 'success');
  } catch (e) {
    console.error('Deployment list exception:', e);
    showStatus(`Network error listing deployments: ${e.message}. Type your deployment name manually.`, 'error');
  }
}

function populateDeployments(list) {
  const sel = document.getElementById('modelSelect');
  sel.innerHTML = '<option value="">— Select Deployment —</option>';
  list.forEach(name => {
    const opt = document.createElement('option');
    opt.value = name; opt.textContent = name;
    sel.appendChild(opt);
  });
}

function toggleSysPrompt() {
  const el = document.getElementById('sysPrompt');
  const arrow = document.getElementById('sysArrow');
  el.classList.toggle('hidden');
  arrow.textContent = el.classList.contains('hidden') ? '▸' : '▾';
}

// File handling
const dropZone = document.getElementById('dropZone');
const fileInput = document.getElementById('fileInput');

dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFile(e.dataTransfer.files[0]); });
fileInput.addEventListener('change', e => { if (e.target.files[0]) handleFile(e.target.files[0]); });

function handleFile(file) {
  if (!file) return;
  fileName = file.name;
  const reader = new FileReader();
  reader.onload = e => {
    sourceHTML = e.target.result;
    dropZone.classList.add('loaded');
    dropZone.innerHTML = `
      <div class="filename">${file.name}</div>
      <div class="filesize">${(file.size / 1024).toFixed(1)} KB &middot; ${sourceHTML.split('\n').length} lines</div>
      <div class="label" style="margin-top:8px; font-size:0.7rem;">Click to replace</div>
      <input type="file" id="fileInput" accept=".html,.htm,.svg,.xml" style="display:none">
    `;
    dropZone.querySelector('input').addEventListener('change', ev => { if (ev.target.files[0]) handleFile(ev.target.files[0]); });
    dropZone.onclick = () => dropZone.querySelector('input').click();

    const preview = document.getElementById('codePreview');
    preview.classList.remove('hidden');
    preview.textContent = sourceHTML.substring(0, 2000) + (sourceHTML.length > 2000 ? '\n\n... truncated ...' : '');

    document.getElementById('fileMeta').textContent = `~${Math.ceil(sourceHTML.length / 4)} tokens`;
    updateSendState();
  };
  reader.readAsText(file);
}

function updateSendState() {
  const btn = document.getElementById('sendBtn');
  const hasFile = sourceHTML.length > 0;
  const hasQuery = document.getElementById('queryInput').value.trim().length > 0;
  btn.disabled = !(hasFile && hasQuery);
}
document.getElementById('queryInput').addEventListener('input', updateSendState);

// Azure API call
async function sendToAzure() {
  const endpoint = document.getElementById('endpoint').value.trim().replace(/\/+$/, '');
  const apiKey = document.getElementById('apiKey').value.trim();
  const deployment = document.getElementById('modelSelect').value || document.getElementById('deploymentInput').value.trim();
  const apiVersion = document.getElementById('apiVersion').value;
  const query = document.getElementById('queryInput').value.trim();
  const sysPrompt = document.getElementById('sysPrompt').value.trim();

  if (!endpoint || !apiKey || !deployment) {
    showStatus('Please configure endpoint, API key, and deployment name', 'error');
    return;
  }

  const btn = document.getElementById('sendBtn');
  btn.disabled = true;
  btn.classList.add('processing');
  btn.textContent = 'Processing…';
  showStatus('Sending to Azure AI…', 'info');

  const systemMessage = sysPrompt || `You are an expert HTML developer. The user will provide an HTML file and instructions for modifying it. Return ONLY the complete modified HTML file — no explanations, no markdown fences, no commentary. Output must start with <!DOCTYPE html> or <html> and be valid HTML.`;

  const userMessage = `Here is the HTML file:\n\n\`\`\`html\n${sourceHTML}\n\`\`\`\n\nInstructions: ${query}`;

  // Build request body — use max_completion_tokens for newer API versions, max_tokens for older
  const isNewerAPI = apiVersion >= '2024-08-01-preview';
  const body = {
    messages: [
      { role: 'system', content: systemMessage },
      { role: 'user', content: userMessage }
    ],
    temperature: 0.2,
  };
  if (isNewerAPI) {
    body.max_completion_tokens = 16000;
  } else {
    body.max_tokens = 16000;
  }

  const url = `${endpoint}/openai/deployments/${deployment}/chat/completions?api-version=${apiVersion}`;

  // Log to console for debugging
  console.log('Request URL:', url);
  console.log('Request body keys:', Object.keys(body));
  console.log('API version:', apiVersion, '| Using', isNewerAPI ? 'max_completion_tokens' : 'max_tokens');

  try {
    const startTime = Date.now();

    const res = await fetch(url, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'api-key': apiKey,
      },
      body: JSON.stringify(body)
    });

    const elapsed = ((Date.now() - startTime) / 1000).toFixed(1);

    if (!res.ok) {
      // Get the FULL error for diagnostics
      const errText = await res.text();
      console.error(`Azure API Error [${res.status}]:`, errText);
      let errMsg = `HTTP ${res.status}`;
      try {
        const errJson = JSON.parse(errText);
        errMsg = errJson.error?.message || errJson.error?.code || errMsg;
        // Show inner error if present (Azure often nests details)
        if (errJson.error?.innererror?.message) {
          errMsg += ' — ' + errJson.error.innererror.message;
        }
      } catch { errMsg += ': ' + errText.substring(0, 300); }
      throw new Error(errMsg);
    }

    const data = await res.json();
    console.log('Azure response usage:', data.usage);

    let raw = data.choices?.[0]?.message?.content || '';

    // Strip markdown fences if model wrapped it
    raw = raw.replace(/^```html?\s*\n?/i, '').replace(/\n?```\s*$/i, '').trim();
    // Handle case where entire response is in a fence block
    if (raw.startsWith('```') && raw.endsWith('```')) {
      raw = raw.slice(raw.indexOf('\n') + 1, raw.lastIndexOf('```')).trim();
    }

    // Validate it looks like HTML
    if (!raw.match(/<!doctype|<html|<head|<body|<div|<style/i)) {
      if (raw.includes('<') && raw.includes('>')) {
        // Might be a fragment, use it
      } else {
        // Show what we got so the user can debug
        console.warn('Non-HTML response:', raw.substring(0, 500));
        throw new Error('Response does not appear to be HTML. Check console (F12) for the raw output.');
      }
    }

    outputHTML = raw;
    const usage = data.usage || {};
    const tokens = `${usage.prompt_tokens || '?'} in → ${usage.completion_tokens || '?'} out`;

    showOutput();
    showStatus(`Done in ${elapsed}s · ${tokens}`, 'success');

  } catch (err) {
    showStatus(`Error: ${err.message}`, 'error');
  } finally {
    btn.disabled = false;
    btn.classList.remove('processing');
    btn.textContent = 'Send to Azure AI';
    updateSendState();
  }
}

// Output
function showOutput() {
  const section = document.getElementById('outputSection');
  section.classList.remove('hidden');

  const preview = document.getElementById('outputPreview');
  preview.srcdoc = outputHTML;

  const code = document.getElementById('outputCode');
  code.textContent = outputHTML;

  showTab('preview');
  section.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showTab(tab) {
  const tabs = document.querySelectorAll('.output-tab');
  tabs.forEach(t => t.classList.remove('active'));

  if (tab === 'preview') {
    tabs[0].classList.add('active');
    document.getElementById('outputPreview').classList.remove('hidden');
    document.getElementById('outputCode').classList.add('hidden');
  } else {
    tabs[1].classList.add('active');
    document.getElementById('outputPreview').classList.add('hidden');
    document.getElementById('outputCode').classList.remove('hidden');
  }
}

function downloadOutput() {
  if (!outputHTML) return;
  const blob = new Blob([outputHTML], { type: 'text/html' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = fileName.replace(/\.html?$/i, '') + '_modified.html';
  a.click();
  URL.revokeObjectURL(url);
}

function copyOutput() {
  if (!outputHTML) return;
  navigator.clipboard.writeText(outputHTML).then(() => showStatus('Copied to clipboard', 'success'));
}

function feedBack() {
  // Load output as new source and let user iterate
  sourceHTML = outputHTML;
  const dz = document.getElementById('dropZone');
  dz.classList.add('loaded');
  dz.innerHTML = `
    <div class="filename">← Output fed back as source</div>
    <div class="filesize">${(sourceHTML.length / 1024).toFixed(1)} KB &middot; ${sourceHTML.split('\n').length} lines</div>
    <div class="label" style="margin-top:8px; font-size:0.7rem;">Click to upload a different file</div>
    <input type="file" id="fileInput" accept=".html,.htm,.svg,.xml" style="display:none">
  `;
  dz.querySelector('input').addEventListener('change', ev => { if (ev.target.files[0]) handleFile(ev.target.files[0]); });
  dz.onclick = () => dz.querySelector('input').click();

  const preview = document.getElementById('codePreview');
  preview.classList.remove('hidden');
  preview.textContent = sourceHTML.substring(0, 2000) + (sourceHTML.length > 2000 ? '\n... truncated ...' : '');

  document.getElementById('fileMeta').textContent = `~${Math.ceil(sourceHTML.length / 4)} tokens`;
  document.getElementById('queryInput').value = '';
  document.getElementById('queryInput').focus();
  showStatus('Output loaded as new source — describe your next changes', 'info');
  updateSendState();
}

// Status
function showStatus(msg, type) {
  const bar = document.getElementById('statusBar');
  bar.className = `status-bar visible ${type}`;
  const spinner = bar.querySelector('.spinner');
  spinner.style.display = type === 'info' ? 'block' : 'none';
  document.getElementById('statusText').innerHTML = msg;
  if (type !== 'info') setTimeout(() => bar.classList.remove('visible'), type === 'error' ? 15000 : 6000);
}
</script>
</body>
