<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>AE Workspace — NYC Labor Day Trip Planner</title>
<link href="https://fonts.googleapis.com/css2?family=SF+Pro+Display:wght@300;400;500;600;700&family=DM+Sans:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f5f7;
  --sidebar-bg: rgba(245,245,247,0.72);
  --card-bg: #ffffff;
  --glass: rgba(255,255,255,0.78);
  --glass-border: rgba(0,0,0,0.08);
  --text-primary: #1d1d1f;
  --text-secondary: #6e6e73;
  --text-tertiary: #aeaeb2;
  --accent: #0071e3;
  --accent-hover: #0077ED;
  --accent-soft: rgba(0,113,227,0.08);
  --red: #ff3b30;
  --orange: #ff9500;
  --green: #34c759;
  --yellow: #ffcc00;
  --purple: #af52de;
  --shadow-sm: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.12);
  --shadow-window: 0 24px 80px rgba(0,0,0,0.18), 0 0 0 0.5px rgba(0,0,0,0.06);
  --radius-sm: 8px;
  --radius-md: 12px;
  --radius-lg: 16px;
  --radius-xl: 20px;
  --dock-height: 68px;
  --topbar-height: 52px;
  --sidebar-width: 240px;
  --font: 'DM Sans', -apple-system, BlinkMacSystemFont, sans-serif;
  --mono: 'JetBrains Mono', monospace;
}

* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; overflow:hidden; font-family:var(--font); background:var(--bg); color:var(--text-primary); -webkit-font-smoothing:antialiased; }

::selection { background:var(--accent); color:#fff; }
::-webkit-scrollbar { width:6px; }
::-webkit-scrollbar-track { background:transparent; }
::-webkit-scrollbar-thumb { background:rgba(0,0,0,0.15); border-radius:3px; }
::-webkit-scrollbar-thumb:hover { background:rgba(0,0,0,0.25); }

/* ── WALLPAPER ── */
.wallpaper {
  position:fixed; inset:0; z-index:0;
  background:
    radial-gradient(ellipse at 20% 50%, rgba(0,113,227,0.04) 0%, transparent 60%),
    radial-gradient(ellipse at 80% 20%, rgba(175,82,222,0.03) 0%, transparent 50%),
    radial-gradient(ellipse at 60% 80%, rgba(52,199,89,0.03) 0%, transparent 50%),
    var(--bg);
}

/* ── TOP BAR ── */
.topbar {
  position:fixed; top:0; left:0; right:0; height:var(--topbar-height); z-index:1000;
  background:rgba(255,255,255,0.72); backdrop-filter:blur(40px) saturate(180%);
  border-bottom:0.5px solid rgba(0,0,0,0.09);
  display:flex; align-items:center; justify-content:space-between;
  padding:0 20px;
  -webkit-app-region:drag;
}
.topbar-left { display:flex; align-items:center; gap:16px; }
.topbar-brand { font-weight:700; font-size:15px; letter-spacing:-0.3px; color:var(--text-primary); display:flex; align-items:center; gap:8px; }
.topbar-brand svg { opacity:0.85; }
.topbar-breadcrumb { display:flex; align-items:center; gap:4px; font-size:13px; color:var(--text-secondary); }
.topbar-breadcrumb span { cursor:pointer; padding:3px 8px; border-radius:6px; transition:all 0.15s; }
.topbar-breadcrumb span:hover { background:rgba(0,0,0,0.04); color:var(--text-primary); }
.topbar-breadcrumb .sep { color:var(--text-tertiary); padding:0 2px; cursor:default; }
.topbar-breadcrumb .sep:hover { background:none; color:var(--text-tertiary); }
.topbar-breadcrumb .current { color:var(--text-primary); font-weight:600; cursor:default; }
.topbar-breadcrumb .current:hover { background:none; }

.topbar-center { flex:1; max-width:480px; margin:0 auto; }
.search-box {
  width:100%; height:34px; border-radius:10px;
  background:rgba(0,0,0,0.04); border:1px solid transparent;
  display:flex; align-items:center; gap:8px; padding:0 12px;
  transition:all 0.2s;
}
.search-box:focus-within { background:#fff; border-color:var(--accent); box-shadow:0 0 0 3px rgba(0,113,227,0.12); }
.search-box svg { flex-shrink:0; color:var(--text-tertiary); }
.search-box input { flex:1; border:none; background:none; outline:none; font-size:13px; font-family:var(--font); color:var(--text-primary); }
.search-box input::placeholder { color:var(--text-tertiary); }

.topbar-right { display:flex; align-items:center; gap:6px; }
.topbar-btn {
  width:34px; height:34px; border-radius:8px; border:none; background:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-secondary); transition:all 0.15s;
}
.topbar-btn:hover { background:rgba(0,0,0,0.05); color:var(--text-primary); }
.topbar-btn.active { background:var(--accent-soft); color:var(--accent); }
.view-toggle { display:flex; background:rgba(0,0,0,0.04); border-radius:8px; padding:2px; }
.view-toggle button {
  width:30px; height:28px; border-radius:6px; border:none; background:none;
  cursor:pointer; display:flex; align-items:center; justify-content:center;
  color:var(--text-secondary); transition:all 0.15s; font-size:12px;
}
.view-toggle button.active { background:#fff; color:var(--text-primary); box-shadow:var(--shadow-sm); }

.user-avatar {
  width:30px; height:30px; border-radius:50%; background:linear-gradient(135deg, var(--accent), var(--purple));
  display:flex; align-items:center; justify-content:center; color:#fff; font-size:12px; font-weight:600;
  cursor:pointer; margin-left:6px;
}

/* ── SIDEBAR ── */
.sidebar {
  position:fixed; top:var(--topbar-height); left:0; bottom:var(--dock-height);
  width:var(--sidebar-width); z-index:100;
  background:var(--sidebar-bg); backdrop-filter:blur(40px) saturate(180%);
  border-right:0.5px solid rgba(0,0,0,0.06);
  padding:16px 12px; overflow-y:auto;
  display:flex; flex-direction:column; gap:2px;
}
.sidebar-section { margin-bottom:16px; }
.sidebar-section-title { font-size:11px; font-weight:600; color:var(--text-tertiary); text-transform:uppercase; letter-spacing:0.5px; padding:4px 12px; margin-bottom:4px; }
.sidebar-item {
  display:flex; align-items:center; gap:10px; padding:7px 12px; border-radius:8px;
  cursor:pointer; transition:all 0.15s; font-size:13px; color:var(--text-secondary);
  font-weight:500; user-select:none;
}
.sidebar-item:hover { background:rgba(0,0,0,0.04); color:var(--text-primary); }
.sidebar-item.active { background:var(--accent-soft); color:var(--accent); }
.sidebar-item svg { flex-shrink:0; width:18px; height:18px; }
.sidebar-item .badge { margin-left:auto; font-size:11px; background:var(--accent); color:#fff; border-radius:10px; padding:1px 7px; font-weight:600; }
.sidebar-item .folder-dot { width:8px; height:8px; border-radius:50%; flex-shrink:0; }

.sidebar-bottom { margin-top:auto; padding-top:12px; border-top:0.5px solid rgba(0,0,0,0.06); }
.storage-bar { margin:8px 12px; }
.storage-bar-track { height:4px; background:rgba(0,0,0,0.06); border-radius:2px; overflow:hidden; }
.storage-bar-fill { height:100%; background:linear-gradient(90deg, var(--accent), var(--purple)); border-radius:2px; transition:width 0.3s; }
.storage-label { font-size:11px; color:var(--text-tertiary); margin-top:6px; }

/* ── MAIN AREA ── */
.main {
  position:fixed; top:var(--topbar-height); left:var(--sidebar-width); right:0; bottom:var(--dock-height);
  overflow-y:auto; padding:24px 28px;
}

.section-title { font-size:13px; font-weight:600; color:var(--text-secondary); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
.section-title::after { content:''; flex:1; height:0.5px; background:rgba(0,0,0,0.06); }

/* ── GRID VIEW ── */
.file-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(150px, 1fr)); gap:12px; margin-bottom:32px; }
.file-card {
  background:var(--card-bg); border-radius:var(--radius-md); border:1px solid var(--glass-border);
  padding:16px 14px 12px; cursor:pointer; transition:all 0.2s; position:relative;
  display:flex; flex-direction:column; align-items:center; text-align:center;
}
.file-card:hover { border-color:rgba(0,113,227,0.25); box-shadow:0 2px 12px rgba(0,113,227,0.06); transform:translateY(-1px); }
.file-card.selected { border-color:var(--accent); box-shadow:0 0 0 2px rgba(0,113,227,0.15); }
.file-card .icon-wrap { width:56px; height:56px; border-radius:14px; display:flex; align-items:center; justify-content:center; margin-bottom:10px; position:relative; }
.file-card .icon-wrap.folder { background:linear-gradient(135deg, #64B5F6, #42A5F5); }
.file-card .icon-wrap.doc { background:linear-gradient(135deg, #5C9CE5, #3D7DD4); }
.file-card .icon-wrap.sheet { background:linear-gradient(135deg, #66BB6A, #43A047); }
.file-card .icon-wrap.slide { background:linear-gradient(135deg, #FFA726, #FB8C00); }
.file-card .icon-wrap.pdf { background:linear-gradient(135deg, #EF5350, #E53935); }
.file-card .icon-wrap.image { background:linear-gradient(135deg, #AB47BC, #8E24AA); }
.file-card .icon-wrap.other { background:linear-gradient(135deg, #BDBDBD, #9E9E9E); }
.file-card .icon-wrap svg { color:#fff; }
.file-card .file-name { font-size:12px; font-weight:500; color:var(--text-primary); line-height:1.3; word-break:break-word; max-width:100%; overflow:hidden; text-overflow:ellipsis; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; }
.file-card .file-meta { font-size:10px; color:var(--text-tertiary); margin-top:4px; }
.file-card .file-star { position:absolute; top:8px; right:8px; opacity:0; transition:opacity 0.15s; cursor:pointer; color:var(--yellow); }
.file-card:hover .file-star { opacity:0.5; }
.file-card .file-star:hover { opacity:1 !important; }
.file-card .file-star.starred { opacity:1; }

/* ── LIST VIEW ── */
.file-list { margin-bottom:32px; }
.file-list-header {
  display:grid; grid-template-columns:1fr 120px 140px 100px 40px;
  padding:8px 16px; font-size:11px; font-weight:600; color:var(--text-tertiary);
  text-transform:uppercase; letter-spacing:0.3px; border-bottom:0.5px solid rgba(0,0,0,0.06);
}
.file-list-row {
  display:grid; grid-template-columns:1fr 120px 140px 100px 40px;
  padding:10px 16px; align-items:center; border-radius:10px;
  cursor:pointer; transition:all 0.15s; font-size:13px;
}
.file-list-row:hover { background:rgba(0,0,0,0.03); }
.file-list-row.selected { background:var(--accent-soft); }
.file-list-row .row-name { display:flex; align-items:center; gap:10px; font-weight:500; }
.file-list-row .row-name .mini-icon { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.file-list-row .row-name .mini-icon svg { width:14px; height:14px; color:#fff; }
.file-list-row .row-name .mini-icon.folder { background:linear-gradient(135deg, #64B5F6, #42A5F5); }
.file-list-row .row-name .mini-icon.doc { background:linear-gradient(135deg, #5C9CE5, #3D7DD4); }
.file-list-row .row-name .mini-icon.sheet { background:linear-gradient(135deg, #66BB6A, #43A047); }
.file-list-row .row-name .mini-icon.slide { background:linear-gradient(135deg, #FFA726, #FB8C00); }
.file-list-row .row-name .mini-icon.pdf { background:linear-gradient(135deg, #EF5350, #E53935); }
.file-list-row .row-name .mini-icon.image { background:linear-gradient(135deg, #AB47BC, #8E24AA); }
.file-list-row .row-name .mini-icon.other { background:linear-gradient(135deg, #BDBDBD, #9E9E9E); }
.file-list-row .row-owner { color:var(--text-secondary); font-size:12px; }
.file-list-row .row-modified { color:var(--text-secondary); font-size:12px; }
.file-list-row .row-size { color:var(--text-tertiary); font-size:12px; }
.file-list-row .row-more { opacity:0; transition:opacity 0.15s; }
.file-list-row:hover .row-more { opacity:1; }

/* ── FLOATING WINDOW ── */
.float-window {
  position:fixed; z-index:500; min-width:520px; min-height:380px;
  background:var(--card-bg); border-radius:var(--radius-lg);
  box-shadow:var(--shadow-window);
  display:flex; flex-direction:column; overflow:hidden;
  animation:windowIn 0.28s cubic-bezier(0.16,1,0.3,1);
}
@keyframes windowIn {
  from { opacity:0; transform:scale(0.92) translateY(12px); }
  to { opacity:1; transform:scale(1) translateY(0); }
}
.float-window.closing { animation:windowOut 0.2s ease forwards; }
@keyframes windowOut {
  to { opacity:0; transform:scale(0.95) translateY(8px); }
}
.win-titlebar {
  height:44px; display:flex; align-items:center; padding:0 16px;
  background:rgba(245,245,247,0.85); border-bottom:0.5px solid rgba(0,0,0,0.06);
  cursor:grab; user-select:none; flex-shrink:0;
}
.win-titlebar:active { cursor:grabbing; }
.win-dots { display:flex; gap:7px; margin-right:14px; }
.win-dot { width:12px; height:12px; border-radius:50%; cursor:pointer; transition:all 0.15s; position:relative; }
.win-dot.close { background:#ff5f57; }
.win-dot.minimize { background:#febc2e; }
.win-dot.maximize { background:#28c840; }
.win-dot:hover { filter:brightness(0.9); }
.win-dot::after { content:''; position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:9px; color:rgba(0,0,0,0.5); opacity:0; transition:opacity 0.1s; }
.win-titlebar:hover .win-dot.close::after { content:'×'; opacity:1; font-size:13px; line-height:12px; text-align:center; }
.win-titlebar:hover .win-dot.minimize::after { content:'−'; opacity:1; font-size:13px; line-height:12px; text-align:center; }
.win-titlebar:hover .win-dot.maximize::after { content:'+'; opacity:1; font-size:11px; line-height:12px; text-align:center; }
.win-title { font-size:13px; font-weight:600; color:var(--text-primary); flex:1; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
.win-title-icon { display:inline-flex; width:16px; height:16px; border-radius:4px; align-items:center; justify-content:center; margin-right:6px; vertical-align:middle; }
.win-title-icon svg { width:10px; height:10px; color:#fff; }
.win-actions { display:flex; gap:4px; }
.win-action { width:28px; height:28px; border:none; background:none; border-radius:6px; cursor:pointer; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:all 0.15s; }
.win-action:hover { background:rgba(0,0,0,0.05); }

.win-toolbar {
  display:flex; align-items:center; gap:4px; padding:8px 16px;
  border-bottom:0.5px solid rgba(0,0,0,0.04); flex-shrink:0;
}
.toolbar-btn {
  height:30px; padding:0 10px; border:none; background:none; border-radius:6px;
  cursor:pointer; font-size:12px; font-family:var(--font); color:var(--text-secondary);
  display:flex; align-items:center; gap:5px; transition:all 0.15s; font-weight:500;
}
.toolbar-btn:hover { background:rgba(0,0,0,0.05); color:var(--text-primary); }
.toolbar-btn.active { background:var(--accent-soft); color:var(--accent); }
.toolbar-sep { width:1px; height:20px; background:rgba(0,0,0,0.06); margin:0 4px; }
.toolbar-select {
  height:30px; padding:0 8px; border:1px solid rgba(0,0,0,0.08); border-radius:6px;
  background:none; font-size:12px; font-family:var(--font); color:var(--text-primary);
  cursor:pointer; outline:none;
}

.win-body { flex:1; overflow:auto; }

/* Document Editor */
.doc-editor {
  padding:40px 56px; min-height:100%; outline:none; font-size:15px; line-height:1.7;
  color:var(--text-primary); caret-color:var(--accent);
}
.doc-editor:empty::before { content:attr(data-placeholder); color:var(--text-tertiary); }
.doc-editor h1 { font-size:28px; font-weight:700; margin-bottom:8px; line-height:1.3; }
.doc-editor h2 { font-size:22px; font-weight:600; margin-bottom:6px; line-height:1.35; }
.doc-editor h3 { font-size:17px; font-weight:600; margin-bottom:4px; }
.doc-editor p { margin-bottom:12px; }
.doc-editor ul, .doc-editor ol { margin-left:24px; margin-bottom:12px; }
.doc-editor blockquote { border-left:3px solid var(--accent); padding-left:16px; color:var(--text-secondary); margin-bottom:12px; }

/* Spreadsheet */
.sheet-wrap { width:100%; height:100%; overflow:auto; }
.sheet-table { border-collapse:collapse; width:max-content; min-width:100%; }
.sheet-table th {
  background:rgba(245,245,247,0.9); position:sticky; top:0; z-index:2;
  font-size:11px; font-weight:600; color:var(--text-tertiary); padding:6px 12px;
  border:0.5px solid rgba(0,0,0,0.06); min-width:100px; text-align:center;
  user-select:none;
}
.sheet-table th.row-header { position:sticky; left:0; z-index:3; min-width:50px; background:rgba(245,245,247,0.95); }
.sheet-table th.corner { position:sticky; left:0; top:0; z-index:4; min-width:50px; }
.sheet-table td {
  border:0.5px solid rgba(0,0,0,0.06); padding:0; font-size:13px; height:30px;
  min-width:100px; position:relative;
}
.sheet-table td.row-num { background:rgba(245,245,247,0.9); text-align:center; font-size:11px; color:var(--text-tertiary); font-weight:500; position:sticky; left:0; z-index:1; min-width:50px; padding:6px; user-select:none; }
.sheet-cell {
  width:100%; height:100%; border:none; outline:none; padding:4px 10px;
  font-size:13px; font-family:var(--font); background:transparent; color:var(--text-primary);
}
.sheet-cell:focus { box-shadow:inset 0 0 0 2px var(--accent); border-radius:1px; }

/* ── NEW FILE MENU ── */
.new-menu {
  position:fixed; z-index:2000;
  background:var(--glass); backdrop-filter:blur(40px) saturate(180%);
  border:0.5px solid var(--glass-border); border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg); padding:6px; min-width:200px;
  animation:menuIn 0.15s ease;
}
@keyframes menuIn { from { opacity:0; transform:translateY(-4px); } }
.new-menu-item {
  display:flex; align-items:center; gap:10px; padding:8px 12px; border-radius:8px;
  cursor:pointer; font-size:13px; font-weight:500; transition:all 0.1s; color:var(--text-primary);
}
.new-menu-item:hover { background:var(--accent); color:#fff; }
.new-menu-item:hover .nmi-icon { color:#fff; }
.nmi-icon { width:24px; height:24px; border-radius:6px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
.nmi-icon.folder { background:rgba(66,165,245,0.12); color:#42A5F5; }
.nmi-icon.doc { background:rgba(61,125,212,0.12); color:#3D7DD4; }
.nmi-icon.sheet { background:rgba(67,160,71,0.12); color:#43A047; }
.nmi-icon.slide { background:rgba(251,140,0,0.12); color:#FB8C00; }
.menu-sep { height:0.5px; background:rgba(0,0,0,0.06); margin:4px 8px; }

/* ── CONTEXT MENU ── */
.ctx-menu {
  position:fixed; z-index:3000;
  background:var(--glass); backdrop-filter:blur(40px) saturate(180%);
  border:0.5px solid var(--glass-border); border-radius:var(--radius-md);
  box-shadow:var(--shadow-lg); padding:6px; min-width:180px;
  animation:menuIn 0.12s ease;
}
.ctx-item {
  display:flex; align-items:center; gap:10px; padding:7px 12px; border-radius:7px;
  cursor:pointer; font-size:13px; transition:all 0.1s; color:var(--text-primary);
}
.ctx-item:hover { background:var(--accent); color:#fff; }
.ctx-item.danger:hover { background:var(--red); }
.ctx-item .shortcut { margin-left:auto; font-size:11px; color:var(--text-tertiary); font-family:var(--mono); }
.ctx-item:hover .shortcut { color:rgba(255,255,255,0.7); }

/* ── DOCK ── */
.dock-wrap {
  position:fixed; bottom:0; left:0; right:0; height:var(--dock-height); z-index:900;
  display:flex; align-items:center; justify-content:center;
  background:rgba(255,255,255,0.65); backdrop-filter:blur(40px) saturate(180%);
  border-top:0.5px solid rgba(0,0,0,0.06);
}
.dock {
  display:flex; align-items:center; gap:4px; padding:8px 16px;
  background:rgba(255,255,255,0.5); border-radius:18px;
}
.dock-item {
  width:44px; height:44px; border-radius:12px; cursor:pointer;
  display:flex; align-items:center; justify-content:center;
  transition:all 0.2s cubic-bezier(0.16,1,0.3,1); position:relative;
}
.dock-item:hover { transform:translateY(-4px) scale(1.12); }
.dock-item.active::after { content:''; position:absolute; bottom:-4px; width:4px; height:4px; border-radius:50%; background:var(--text-secondary); }
.dock-item svg { width:24px; height:24px; }
.dock-sep { width:1px; height:32px; background:rgba(0,0,0,0.08); margin:0 6px; }

.dock-item .dock-icon { width:44px; height:44px; border-radius:12px; display:flex; align-items:center; justify-content:center; }
.dock-icon.home-icon { background:linear-gradient(135deg, #5AC8FA, #007AFF); color:#fff; }
.dock-icon.doc-icon { background:linear-gradient(135deg, #5C9CE5, #3D7DD4); color:#fff; }
.dock-icon.sheet-icon { background:linear-gradient(135deg, #66BB6A, #43A047); color:#fff; }
.dock-icon.slide-icon { background:linear-gradient(135deg, #FFA726, #FB8C00); color:#fff; }
.dock-icon.trash-icon { background:linear-gradient(135deg, #BDBDBD, #9E9E9E); color:#fff; }

/* ── RENAME INPUT ── */
.rename-input {
  font-size:12px; font-weight:500; font-family:var(--font); border:1.5px solid var(--accent);
  border-radius:4px; padding:2px 6px; outline:none; text-align:center; width:120px;
  box-shadow:0 0 0 3px rgba(0,113,227,0.12);
}

/* ── EMPTY STATE ── */
.empty-state { text-align:center; padding:80px 40px; }
.empty-state svg { margin-bottom:16px; color:var(--text-tertiary); }
.empty-state h3 { font-size:17px; font-weight:600; color:var(--text-primary); margin-bottom:6px; }
.empty-state p { font-size:13px; color:var(--text-secondary); max-width:320px; margin:0 auto; }

/* ── TOOLTIP ── */
.tooltip {
  position:fixed; z-index:4000; background:var(--text-primary); color:#fff;
  font-size:11px; font-weight:500; padding:4px 10px; border-radius:6px;
  pointer-events:none; animation:menuIn 0.12s ease; white-space:nowrap;
}

/* ── NOTIFICATION ── */
.notif {
  position:fixed; bottom:calc(var(--dock-height) + 16px); left:50%; transform:translateX(-50%);
  z-index:5000; background:var(--text-primary); color:#fff; padding:10px 20px;
  border-radius:12px; font-size:13px; font-weight:500; box-shadow:var(--shadow-lg);
  animation:notifIn 0.3s cubic-bezier(0.16,1,0.3,1);
}
@keyframes notifIn { from { opacity:0; transform:translateX(-50%) translateY(12px); } }
.notif.out { animation:notifOut 0.2s ease forwards; }
@keyframes notifOut { to { opacity:0; transform:translateX(-50%) translateY(12px); } }

/* Drag ghost */
.drag-ghost { position:fixed; pointer-events:none; z-index:9999; opacity:0.85; }
</style>
</head>

    </div>

<div class="main" id="mainArea" oncontextmenu="showCtxMenu(event)"></div>

<!-- DOCK -->
<div class="dock-wrap">

      </div>

<script>
// ═══════════════════════════════════════════════
//  AE WORKSPACE — Rev 4
//  File system + Document/Sheet editor
// ═══════════════════════════════════════════════

// ── DATA LAYER ──
const LS_KEY = 'ae_ws_nyc_trip_v1';
const COLORS = ['#42A5F5','#66BB6A','#FFA726','#EF5350','#AB47BC','#26A69A','#EC407A','#7E57C2'];

let STATE = load();
let currentPath = []; // array of folder IDs = breadcrumb
let currentView = 'grid';
let openWindows = [];
let winZ = 500;
let selectedIds = new Set();
let clipBoard = null;
let currentSection = 'root'; // root | recent | starred | trash
let userName = '';
let sortMode = 'name'; // name | modified | type

function defaultState() {
  return {
    files: {},
    trash: {},
    nextId: 1,
    user: ''
  };
}

function load() {
  try { const d = JSON.parse(localStorage.getItem(LS_KEY)); return d && d.files ? d : defaultState(); }
  catch { return defaultState(); }
}
function save() { localStorage.setItem(LS_KEY, JSON.stringify(STATE)); updateStorage(); }

function genId() { return 'f' + (STATE.nextId++); }

function now() { return new Date().toISOString(); }

function esc(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }

// ── FILE OPS ──
function getFile(id) { return STATE.files[id] || STATE.trash[id]; }

function getChildren(parentId) {
  return Object.values(STATE.files).filter(f => f.parent === (parentId || null));
}

function getCurrentParent() {
  return currentPath.length ? currentPath[currentPath.length - 1] : null;
}

function createItem(type, name, parent) {
  const id = genId();
  const item = {
    id, type, name,
    parent: parent || null,
    created: now(),
    modified: now(),
    starred: false,
    owner: STATE.user || 'Me',
    content: type === 'sheet' ? makeEmptySheet() : '',
    size: type === 'folder' ? null : '0 KB'
  };
  STATE.files[id] = item;
  save();
  return item;
}

function makeEmptySheet() {
  const rows = 20, cols = 8;
  const data = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) row.push('');
    data.push(row);
  }
  return JSON.stringify(data);
}

function renameItem(id, newName) {
  if (STATE.files[id]) { STATE.files[id].name = newName; STATE.files[id].modified = now(); save(); }
}

function trashItem(id) {
  const f = STATE.files[id];
  if (!f) return;
  // also trash children
  if (f.type === 'folder') {
    getChildren(id).forEach(c => trashItem(c.id));
  }
  delete STATE.files[id];
  STATE.trash[id] = f;
  save();
}

function restoreItem(id) {
  const f = STATE.trash[id];
  if (!f) return;
  delete STATE.trash[id];
  // if parent doesn't exist, move to root
  if (f.parent && !STATE.files[f.parent]) f.parent = null;
  STATE.files[id] = f;
  save();
}

function permDelete(id) {
  delete STATE.trash[id];
  save();
}

function toggleStar(id) {
  if (STATE.files[id]) {
    STATE.files[id].starred = !STATE.files[id].starred;
    save();
  }
}

function moveItem(id, newParent) {
  if (STATE.files[id]) {
    STATE.files[id].parent = newParent;
    STATE.files[id].modified = now();
    save();
  }
}

function duplicateItem(id) {
  const orig = STATE.files[id];
  if (!orig) return;
  const dup = createItem(orig.type, orig.name + ' copy', orig.parent);
  dup.content = orig.content;
  save();
  return dup;
}

// ── NAVIGATION ──
function navTo(section, folderId) {
  closeAllMenus();
  currentSection = section;
  selectedIds.clear();

  if (section === 'root') {
    if (folderId) {
      // build path
      const path = [];
      let cur = folderId;
      while (cur) {
        path.unshift(cur);
        const f = STATE.files[cur];
        cur = f ? f.parent : null;
      }
      currentPath = path;
    } else {
      currentPath = [];
    }
  } else {
    currentPath = [];
  }

  updateSidebar();
  renderMain();
  updateBreadcrumb();
}

function openFolder(id) {
  navTo('root', id);
}

// ── RENDER ──
function renderMain() {
  const area = document.getElementById('mainArea');
  let items = [];

  if (currentSection === 'root') {
    items = getChildren(getCurrentParent());
  } else if (currentSection === 'recent') {
    items = Object.values(STATE.files).filter(f => f.type !== 'folder')
      .sort((a, b) => new Date(b.modified) - new Date(a.modified)).slice(0, 30);
  } else if (currentSection === 'starred') {
    items = Object.values(STATE.files).filter(f => f.starred);
  } else if (currentSection === 'trash') {
    items = Object.values(STATE.trash);
  }

  // search filter
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  if (q) {
    items = items.filter(f => f.name.toLowerCase().includes(q));
  }

  // sort
  items = sortItems(items);

  if (!items.length) {
    const msgs = {
      root: { t: 'This folder is empty', s: 'Create a new file or folder to get started' },
      recent: { t: 'No recent files', s: 'Files you open will appear here' },
      starred: { t: 'No starred items', s: 'Star important files for quick access' },
      trash: { t: 'Trash is empty', s: 'Deleted files will appear here' }
    };
    const m = msgs[currentSection] || msgs.root;
    area.innerHTML = `<div class="empty-state">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round">
        <path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/>
      </svg>
      <h3>${m.t}</h3><p>${m.s}</p>
    </div>`;
    return;
  }

  const folders = items.filter(i => i.type === 'folder');
  const files = items.filter(i => i.type !== 'folder');

  let html = '';

  if (currentView === 'grid') {
    if (folders.length) {
      html += `<div class="section-title">Folders</div><div class="file-grid">`;
      folders.forEach(f => html += renderGridCard(f));
      html += `</div>`;
    }
    if (files.length) {
      html += `<div class="section-title">Files</div><div class="file-grid">`;
      files.forEach(f => html += renderGridCard(f));
      html += `</div>`;
    }
  } else {
    html += `<div class="file-list">`;
    html += `<div class="file-list-header"><span>Name</span><span>Owner</span><span>Modified</span><span>Size</span><span></span></div>`;
    folders.forEach(f => html += renderListRow(f));
    files.forEach(f => html += renderListRow(f));
    html += `</div>`;
  }

  area.innerHTML = html;
}

function renderGridCard(f) {
  const sel = selectedIds.has(f.id) ? ' selected' : '';
  const starCls = f.starred ? ' starred' : '';
  return `<div class="file-card${sel}" data-id="${f.id}"
    onclick="handleClick(event,'${f.id}')"
    ondblclick="handleDblClick('${f.id}')"
    oncontextmenu="showFileCtx(event,'${f.id}')">
    <span class="file-star${starCls}" onclick="event.stopPropagation();toggleStar('${f.id}');renderMain();updateStarBadge();">★</span>
    <div class="icon-wrap ${f.type}">${getIcon(f.type)}</div>
    <div class="file-name">${esc(f.name)}</div>
    <div class="file-meta">${timeAgo(f.modified)}</div>
  </div>`;
}

function renderListRow(f) {
  const sel = selectedIds.has(f.id) ? ' selected' : '';
  return `<div class="file-list-row${sel}" data-id="${f.id}"
    onclick="handleClick(event,'${f.id}')"
    ondblclick="handleDblClick('${f.id}')"
    oncontextmenu="showFileCtx(event,'${f.id}')">
    <span class="row-name"><span class="mini-icon ${f.type}">${getIcon(f.type, 14)}</span>${esc(f.name)}</span>
    <span class="row-owner">${esc(f.owner || 'Me')}</span>
    <span class="row-modified">${formatDate(f.modified)}</span>
    <span class="row-size">${f.size || '—'}</span>
    <span class="row-more">
      <button style="border:none;background:none;cursor:pointer;color:var(--text-tertiary)" onclick="event.stopPropagation();showFileCtx(event,'${f.id}')">⋯</button>
    </span>
  </div>`;
}

function getIcon(type, size = 24) {
  const s = size;
  const icons = {
    folder: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 20h16a2 2 0 0 0 2-2V8a2 2 0 0 0-2-2h-7.93a2 2 0 0 1-1.66-.9l-.82-1.2A2 2 0 0 0 7.93 3H4a2 2 0 0 0-2 2v13c0 1.1.9 2 2 2Z"/></svg>`,
    doc: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    sheet: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/></svg>`,
    slide: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`,
    pdf: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg>`,
    image: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    other: `<svg width="${s}" height="${s}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8Z"/><polyline points="14 2 14 8 20 8"/></svg>`
  };
  return icons[type] || icons.other;
}

// ── SORTING ──
function sortItems(items) {
  return items.sort((a, b) => {
    if (sortMode === 'name') return a.name.localeCompare(b.name);
    if (sortMode === 'modified') return new Date(b.modified) - new Date(a.modified);
    if (sortMode === 'type') return a.type.localeCompare(b.type);
    return 0;
  });
}

function sortFiles() {
  const modes = ['name', 'modified', 'type'];
  const idx = modes.indexOf(sortMode);
  sortMode = modes[(idx + 1) % modes.length];
  showNotif(`Sorted by ${sortMode}`);
  renderMain();
}

// ── INTERACTIONS ──
function handleClick(e, id) {
  if (e.metaKey || e.ctrlKey) {
    selectedIds.has(id) ? selectedIds.delete(id) : selectedIds.add(id);
  } else {
    selectedIds.clear();
    selectedIds.add(id);
  }
  renderMain();
}

function handleDblClick(id) {
  const f = getFile(id);
  if (!f) return;
  if (currentSection === 'trash') return;
  if (f.type === 'folder') {
    openFolder(id);
  } else {
    openFileWindow(id);
  }
}

function handleSearch(val) { renderMain(); }

// ── BREADCRUMB ──
function updateBreadcrumb() {
  const bc = document.getElementById('breadcrumb');
  if (currentSection !== 'root') {
    const labels = { recent: 'Recent', starred: 'Starred', trash: 'Trash' };
    bc.innerHTML = `<span class="sep">›</span><span class="current">${labels[currentSection]}</span>`;
    return;
  }
  let html = `<span onclick="navTo('root')">Home</span>`;
  currentPath.forEach((pid, i) => {
    const f = STATE.files[pid];
    if (!f) return;
    const isLast = i === currentPath.length - 1;
    html += `<span class="sep">›</span>`;

  });
  bc.innerHTML = html;
}

// ── RENAME ──
function startRename(id) {
  const card = document.querySelector(`[data-id="${id}"]`);
  if (!card) return;
  const nameEl = card.querySelector('.file-name') || card.querySelector('.row-name');
  if (!nameEl) return;
  const f = getFile(id);
  const input = document.createElement('input');
  input.className = 'rename-input';
  input.value = f.name;
  input.onclick = e => e.stopPropagation();
  input.ondblclick = e => e.stopPropagation();
  input.onkeydown = e => {
    if (e.key === 'Enter') { finishRename(id, input.value); }
    if (e.key === 'Escape') { renderMain(); }
  };
  input.onblur = () => { finishRename(id, input.value); };

  if (card.classList.contains('file-card')) {
    const fn = card.querySelector('.file-name');
    fn.innerHTML = '';
    fn.appendChild(input);
  } else {
    const span = nameEl.childNodes[1] || nameEl;
    if (nameEl.querySelector('.mini-icon')) {
      const textNode = nameEl.lastChild;
      const wrapper = document.createElement('span');
      wrapper.appendChild(input);
      textNode.replaceWith(wrapper);
    }
  }
  input.focus();
  input.select();
}

function finishRename(id, val) {
  if (val.trim()) renameItem(id, val.trim());
  renderMain();
  updateSidebar();
}

function openFileWindow(id) {

    toolbar = `<div class="win-toolbar">
      <select class="toolbar-select" onchange="execCmd('formatBlock',this.value)">
        <option value="p">Paragraph</option>
        <option value="h1">Heading 1</option>
        <option value="h2">Heading 2</option>
        <option value="h3">Heading 3</option>
      </select>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="execCmd('bold')" title="Bold"><strong>B</strong></button>
      <button class="toolbar-btn" onclick="execCmd('italic')" title="Italic"><em>I</em></button>
      <button class="toolbar-btn" onclick="execCmd('underline')" title="Underline"><u>U</u></button>
      <button class="toolbar-btn" onclick="execCmd('strikeThrough')" title="Strike"><s>S</s></button>

      <button class="toolbar-btn" onclick="execCmd('insertOrderedList')" title="Numbered list">1.</button>
      <button class="toolbar-btn" onclick="execCmd('formatBlock','blockquote')" title="Quote">❝</button>
      <div class="toolbar-sep"></div>
      <button class="toolbar-btn" onclick="execCmd('justifyLeft')">⫷</button>
      <button class="toolbar-btn" onclick="execCmd('justifyCenter')">☰</button>
      <button class="toolbar-btn" onclick="execCmd('justifyRight')">⫸</button>
    </div>`;
  } else if (f.type === 'sheet') {
    toolbar = `<div class="win-toolbar">
      <button class="toolbar-btn" onclick="addSheetRow('${id}',this)">+ Row</button>
      <button class="toolbar-btn" onclick="addSheetCol('${id}',this)">+ Column</button>
      <div class="toolbar-sep"></div>
      <span style="font-size:11px;color:var(--text-tertiary)">Click cell to edit · Tab to move</span>
    </div>`;
  }

    body = `<div class="doc-editor" contenteditable="true" data-placeholder="Start typing…" data-file-id="${id}" oninput="saveDocContent('${id}',this)">${f.content || ''}</div>`;
  } else if (f.type === 'sheet') {
    body = buildSheetHTML(id);
  } else {
    body = `<div style="padding:40px;text-align:center;color:var(--text-tertiary)"><p style="font-size:15px;margin-bottom:8px">Preview not available</p><p style="font-size:13px">${esc(f.name)}</p></div>`;
  }

function buildSheetHTML(id) {
  const f = getFile(id);
  let data;
  try { data = JSON.parse(f.content); } catch { data = JSON.parse(makeEmptySheet()); }
  const cols = data[0] ? data[0].length : 8;
  const colLetters = Array.from({ length: cols }, (_, i) => String.fromCharCode(65 + i));

  let html = `<div class="sheet-wrap"><table class="sheet-table"><thead><tr><th class="corner"></th>`;
  colLetters.forEach(l => html += `<th>${l}</th>`);
  html += `</tr></thead><tbody>`;
  data.forEach((row, ri) => {
    html += `<tr><td class="row-num">${ri + 1}</td>`;
    row.forEach((cell, ci) => {
      html += `<td><input class="sheet-cell" value="${esc(cell)}" data-file="${id}" data-r="${ri}" data-c="${ci}" onchange="saveSheetCell(this)" onfocus="this.select()"></td>`;
    });
    html += `</tr>`;
  });
  html += `</tbody></table></div>`;
  return html;
}

function saveDocContent(id, el) {
  if (STATE.files[id]) {
    STATE.files[id].content = el.innerHTML;
    STATE.files[id].modified = now();
    STATE.files[id].size = (new Blob([el.innerHTML]).size / 1024).toFixed(1) + ' KB';
    save();
  }
}

function saveSheetCell(input) {
  const id = input.dataset.file;
  const r = parseInt(input.dataset.r);
  const c = parseInt(input.dataset.c);
  const f = STATE.files[id];
  if (!f) return;
  let data;
  try { data = JSON.parse(f.content); } catch { return; }
  if (data[r]) { data[r][c] = input.value; }
  f.content = JSON.stringify(data);
  f.modified = now();
  f.size = (new Blob([f.content]).size / 1024).toFixed(1) + ' KB';
  save();
}

function addSheetRow(id, btn) {
  const f = STATE.files[id];
  if (!f) return;
  let data;
  try { data = JSON.parse(f.content); } catch { return; }
  const cols = data[0] ? data[0].length : 8;
  data.push(Array(cols).fill(''));
  f.content = JSON.stringify(data);
  save();
  // Re-render sheet in window
  const win = openWindows.find(w => w.fileId === id);
  if (win) win.el.querySelector('.win-body').innerHTML = buildSheetHTML(id);
}

function addSheetCol(id, btn) {
  const f = STATE.files[id];
  if (!f) return;
  let data;
  try { data = JSON.parse(f.content); } catch { return; }
  data.forEach(row => row.push(''));
  f.content = JSON.stringify(data);
  save();
  const win = openWindows.find(w => w.fileId === id);
  if (win) win.el.querySelector('.win-body').innerHTML = buildSheetHTML(id);
}

function execCmd(cmd, val) {
  document.execCommand(cmd, false, val || null);
}

function closeWindow(id) {
  const idx = openWindows.findIndex(w => w.fileId === id);
  if (idx === -1) return;
  const win = openWindows[idx];
  win.el.classList.add('closing');
  setTimeout(() => { win.el.remove(); openWindows.splice(idx, 1); }, 200);
}

function minimizeWindow(id) {
  const win = openWindows.find(w => w.fileId === id);
  if (!win) return;
  win.el.style.transition = 'all 0.3s cubic-bezier(0.16,1,0.3,1)';
  win.el.style.transform = 'scale(0.1)';
  win.el.style.opacity = '0';
  setTimeout(() => {
    win.el.style.display = 'none';
    win.el.style.transform = '';
    win.el.style.opacity = '';
    win.el.style.transition = '';
  }, 300);
}

function maximizeWindow(btn, id) {
  const win = openWindows.find(w => w.fileId === id);
  if (!win) return;
  const el = win.el;
  if (el.dataset.maximized === 'true') {
    el.style.cssText = el.dataset.prevStyle + `;z-index:${++winZ}`;
    el.dataset.maximized = 'false';
  } else {
    el.dataset.prevStyle = el.style.cssText;
    el.style.cssText = `left:${parseInt(getComputedStyle(document.querySelector('.sidebar')).width)}px;top:${parseInt(getComputedStyle(document.querySelector('.topbar')).height)}px;right:0;bottom:${parseInt(getComputedStyle(document.querySelector('.dock-wrap')).height)}px;width:auto;height:auto;border-radius:0;z-index:${++winZ}`;
    el.dataset.maximized = 'true';
  }
}

function bringToFront(el) { el.style.zIndex = ++winZ; }

// ── WINDOW DRAG ──
let dragWin = null, dragOff = { x: 0, y: 0 };
function startDrag(e, id) {
  const win = openWindows.find(w => w.fileId === id);
  if (!win) return;
  if (win.el.dataset.maximized === 'true') return;
  dragWin = win.el;
  bringToFront(dragWin);
  dragOff.x = e.clientX - dragWin.offsetLeft;
  dragOff.y = e.clientY - dragWin.offsetTop;
  document.addEventListener('mousemove', onDrag);
  document.addEventListener('mouseup', stopDrag);
}
function onDrag(e) {
  if (!dragWin) return;
  dragWin.style.left = (e.clientX - dragOff.x) + 'px';
  dragWin.style.top = (e.clientY - dragOff.y) + 'px';
}
function stopDrag() { dragWin = null; document.removeEventListener('mousemove', onDrag); document.removeEventListener('mouseup', stopDrag); }

// ── NOTIFICATIONS ──
function showNotif(msg) {
  document.querySelectorAll('.notif').forEach(n => n.remove());
  const n = document.createElement('div');
  n.className = 'notif';
  n.textContent = msg;
  document.body.appendChild(n);
  setTimeout(() => { n.classList.add('out'); setTimeout(() => n.remove(), 200); }, 2000);
}

// ── TIME HELPERS ──
function timeAgo(iso) {
  const d = new Date(iso);
  const diff = Date.now() - d.getTime();
  const mins = Math.floor(diff / 60000);
  if (mins < 1) return 'Just now';
  if (mins < 60) return mins + 'm ago';
  const hrs = Math.floor(mins / 60);
  if (hrs < 24) return hrs + 'h ago';
  const days = Math.floor(hrs / 24);
  if (days < 30) return days + 'd ago';
  return d.toLocaleDateString();
}
function formatDate(iso) {
  return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

    e.preventDefault();
    selectedIds.forEach(id => {
      if (currentSection === 'trash') permDelete(id);
      else trashItem(id);
    });
    selectedIds.clear();
    renderMain(); updateSidebar();
  }
  // Cmd+A
  if ((e.metaKey || e.ctrlKey) && e.key === 'a' && !e.target.closest('[contenteditable]') && !e.target.closest('input')) {
    e.preventDefault();
    const items = currentSection === 'trash' ? Object.values(STATE.trash) : getChildren(getCurrentParent());
    items.forEach(f => selectedIds.add(f.id));
    renderMain();
  }
  // Escape
  if (e.key === 'Escape') { selectedIds.clear(); closeAllMenus(); renderMain(); }
  // Cmd+N
  if ((e.metaKey || e.ctrlKey) && e.key === 'n') { e.preventDefault(); createFile('doc'); }
});
