<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Sheets</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons+Outlined" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f8f9fa;--white:#fff;--text:#202124;--text2:#5f6368;
  --accent:#188038;--accent2:#1a73e8;--border:#e1e3e6;--grid:#e2e5e9;
  --hdr:#f8f9fa;--sel-bg:#e8f0fe;--sel-border:#1a73e8;
  --tb-bg:#edf2fa;--tb-hover:#d3e3fd;--tb-active:#c2d7f5;
  --red:#d93025;--green:#188038;
}
body{font-family:'DM Sans',sans-serif;background:var(--white);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden;-webkit-font-smoothing:antialiased}

/* ── Lock Screen ── */
#lockScreen{position:fixed;inset:0;z-index:9999;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#0d1b2a 0%,#1b3a4b 40%,#274c5b 100%)}
#lockScreen.hidden{display:none}
.lock-card{background:rgba(255,255,255,.06);backdrop-filter:blur(30px);border:1px solid rgba(255,255,255,.1);border-radius:20px;padding:48px 44px;width:420px;text-align:center;box-shadow:0 20px 60px rgba(0,0,0,.4)}
.lock-icon{width:64px;height:64px;margin:0 auto 20px;background:rgba(255,255,255,.08);border-radius:50%;display:flex;align-items:center;justify-content:center}
.lock-icon .material-icons-outlined{font-size:32px;color:#7ec8e3}
.lock-card h2{color:#e0e0e0;font-size:22px;font-weight:600;margin-bottom:6px}
.lock-card p{color:rgba(255,255,255,.5);font-size:13px;margin-bottom:24px}
.lock-input-wrap{position:relative;margin-bottom:16px}
.lock-input{width:100%;padding:14px 48px 14px 18px;border:1px solid rgba(255,255,255,.15);border-radius:12px;background:rgba(255,255,255,.06);color:#fff;font-size:15px;font-family:inherit;outline:none;transition:border-color .2s}
.lock-input:focus{border-color:#7ec8e3}
.lock-input::placeholder{color:rgba(255,255,255,.3)}
.eye-btn{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;cursor:pointer;color:rgba(255,255,255,.4);display:flex;align-items:center}
.eye-btn:hover{color:rgba(255,255,255,.7)}
.lock-btn{width:100%;padding:13px;border:none;border-radius:12px;font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:all .2s;margin-bottom:8px}
.lock-btn.primary{background:linear-gradient(135deg,#7ec8e3,#4da8da);color:#0d1b2a}
.lock-btn.primary:hover{filter:brightness(1.1);transform:translateY(-1px)}
.lock-btn.secondary{background:rgba(255,255,255,.08);color:rgba(255,255,255,.7);border:1px solid rgba(255,255,255,.12)}
.lock-btn.secondary:hover{background:rgba(255,255,255,.12)}
.lock-error{color:#ff6b6b;font-size:12px;margin-top:8px;min-height:18px}
.lock-footer{margin-top:20px;font-size:11px;color:rgba(255,255,255,.3);display:flex;align-items:center;justify-content:center;gap:6px}
.lock-footer .material-icons-outlined{font-size:14px}
.lock-strength{height:4px;border-radius:2px;background:rgba(255,255,255,.1);margin-top:8px;overflow:hidden}
.lock-strength-bar{height:100%;border-radius:2px;transition:width .3s,background .3s;width:0}
.lock-tabs{display:flex;margin-bottom:20px;border-radius:10px;overflow:hidden;border:1px solid rgba(255,255,255,.1)}
.lock-tab{flex:1;padding:10px;font-size:13px;font-weight:500;cursor:pointer;background:transparent;border:none;color:rgba(255,255,255,.5);font-family:inherit;transition:all .2s}
.lock-tab.on{background:rgba(255,255,255,.1);color:#fff}
.confirm-row{display:flex;gap:8px;margin-bottom:16px}
.confirm-row .lock-input{flex:1}

/* ── Security indicator ── */
.sec-badge{display:flex;align-items:center;gap:4px;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;cursor:pointer;border:none;background:rgba(24,128,56,.1);color:var(--green)}
.sec-badge .material-icons-outlined{font-size:14px}
.sec-badge:hover{background:rgba(24,128,56,.18)}
.sec-badge.locked{background:rgba(217,48,37,.08);color:var(--red)}

/* ── Header ── */
.hdr{display:flex;align-items:center;padding:6px 12px;gap:8px;background:var(--white);flex-shrink:0;border-bottom:1px solid var(--border)}
.hdr-icon svg{width:28px;height:28px}
#docTitle{font-size:16px;font-weight:500;border:none;outline:none;padding:3px 6px;border-radius:4px;background:transparent;color:var(--text);font-family:inherit;min-width:80px}
#docTitle:hover{background:#f1f3f4}
#docTitle:focus{background:var(--white);box-shadow:0 0 0 2px var(--accent2)}
.hdr-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.share-btn{background:var(--accent);color:white;border:none;border-radius:20px;padding:7px 20px;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;display:flex;align-items:center;gap:5px}
.share-btn:hover{filter:brightness(.9)}
.avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,#34a853,#fbbc04);display:flex;align-items:center;justify-content:center;color:white;font-size:12px;font-weight:600}

/* ── Toolbar ── */
.toolbar{display:flex;align-items:center;padding:3px 6px;background:var(--tb-bg);gap:1px;flex-shrink:0;overflow-x:auto;border-bottom:1px solid var(--border)}
.tb-sep{width:1px;height:20px;background:#c4c7cc;margin:0 3px;flex-shrink:0}
.tb-btn{width:28px;height:28px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:4px;color:var(--text2);flex-shrink:0}
.tb-btn:hover{background:var(--tb-hover);color:var(--text)}
.tb-btn .material-icons-outlined{font-size:18px}
.tb-select{height:26px;border:1px solid var(--border);background:var(--white);font-size:12px;color:var(--text);padding:0 4px;border-radius:4px;font-family:inherit;outline:none;flex-shrink:0}

/* ── Formula bar ── */
.fbar{display:flex;align-items:center;height:28px;border-bottom:1px solid var(--grid);flex-shrink:0;background:var(--white)}
#cellRef{width:70px;height:100%;border:none;border-right:1px solid var(--grid);text-align:center;font-size:12px;font-family:monospace;color:var(--text2);outline:none;background:var(--hdr);font-weight:500}
.fx{padding:0 6px;color:var(--text2);font-size:14px;font-style:italic;font-weight:600;border-right:1px solid var(--grid);height:100%;display:flex;align-items:center}
#fxInput{flex:1;height:100%;border:none;padding:0 8px;font-size:13px;font-family:monospace;outline:none;color:var(--text)}
#fxInput:focus{background:#e8f0fe}

/* ── Grid ── */
.grid-wrap{flex:1;overflow:auto;position:relative}
.grid-wrap::-webkit-scrollbar{width:14px;height:14px}
.grid-wrap::-webkit-scrollbar-track{background:#f1f3f4}
.grid-wrap::-webkit-scrollbar-thumb{background:#bdc1c6;border-radius:7px;border:3px solid #f1f3f4}
.grid-wrap::-webkit-scrollbar-corner{background:#f1f3f4}
table{border-collapse:collapse;table-layout:fixed}
th.corner{width:40px;min-width:40px;height:22px;background:var(--hdr);border:1px solid var(--grid);position:sticky;top:0;left:0;z-index:4}
th.ch{height:22px;background:var(--hdr);border:1px solid var(--grid);font-size:11px;font-weight:500;color:var(--text2);text-align:center;position:sticky;top:0;z-index:3;min-width:100px;width:100px;cursor:pointer;user-select:none}
th.ch.hl{background:var(--accent2);color:white}
td.rh{width:40px;min-width:40px;background:var(--hdr);border:1px solid var(--grid);font-size:11px;font-weight:500;color:var(--text2);text-align:center;position:sticky;left:0;z-index:2;cursor:pointer;user-select:none}
td.rh.hl{background:var(--accent2);color:white}
td.c{height:24px;border:1px solid var(--grid);padding:0 4px;font-size:13px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis;cursor:cell;user-select:none}
td.c.sel{outline:2px solid var(--sel-border);outline-offset:-1px;z-index:1;background:var(--white)}
td.c.inr{background:var(--sel-bg)}
#editor{position:absolute;display:none;border:2px solid var(--sel-border);font-size:13px;font-family:'DM Sans',sans-serif;padding:0 4px;outline:none;z-index:20;background:white;box-shadow:0 2px 8px rgba(0,0,0,.18);min-width:60px}

/* ── Tabs & Footer ── */
.tabs{height:30px;display:flex;align-items:center;background:var(--hdr);border-top:1px solid var(--grid);padding:0 6px;gap:2px;flex-shrink:0}
.tab{padding:4px 14px;font-size:12px;border-radius:4px 4px 0 0;cursor:pointer;border:1px solid transparent;color:var(--text2);background:transparent;user-select:none}
.tab.on{background:var(--white);border-color:var(--grid);border-bottom-color:white;color:var(--text);font-weight:500}
.tab:hover:not(.on){background:#e8eaed}
.tab-add{width:26px;height:26px;display:flex;align-items:center;justify-content:center;border:none;background:none;cursor:pointer;border-radius:50%;color:var(--text2);margin-left:2px}
.tab-add:hover{background:var(--tb-hover)}
.status{height:22px;display:flex;align-items:center;justify-content:space-between;padding:0 12px;background:var(--white);border-top:1px solid var(--border);font-size:11px;color:var(--text2);flex-shrink:0}

/* ── Password change dialog ── */
#pwDialog{display:none;position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.4);align-items:center;justify-content:center}
#pwDialog.show{display:flex}
.pw-card{background:var(--white);border-radius:16px;padding:28px;width:380px;box-shadow:0 12px 40px rgba(0,0,0,.2)}
.pw-card h3{font-size:16px;margin-bottom:16px}
.pw-card label{font-size:12px;color:var(--text2);display:block;margin-bottom:4px;margin-top:12px}
.pw-card input{width:100%;padding:10px 12px;border:1px solid var(--border);border-radius:8px;font-size:14px;font-family:inherit;outline:none}
.pw-card input:focus{border-color:var(--accent2)}
.pw-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.pw-btns button{padding:9px 20px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:500}
.btn-cancel{border:1px solid var(--border);background:var(--white);color:var(--text)}
.btn-cancel:hover{background:#f1f3f4}
.btn-ok{border:none;background:var(--accent2);color:white}
.btn-ok:hover{filter:brightness(.9)}
.pw-error{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}
</style>
</head>
<body>

<!-- ══════ LOCK SCREEN ══════ -->
<div id="lockScreen">
  <div class="lock-card">
    <div class="lock-icon"><span class="material-icons-outlined">shield</span></div>
    <h2 id="lockTitle">Secure Spreadsheet</h2>
    <p id="lockSubtitle">Your data is encrypted with AES-256-GCM</p>

    <div class="lock-tabs" id="lockTabs">
      <button class="lock-tab on" onclick="setLockMode('unlock')">Unlock</button>
      <button class="lock-tab" onclick="setLockMode('create')">New Password</button>
    </div>

    <div id="unlockView">
      <div class="lock-input-wrap">
        <input class="lock-input" type="password" id="pwUnlock" placeholder="Enter password" autocomplete="off">
        <button class="eye-btn" onclick="toggleVis('pwUnlock')"><span class="material-icons-outlined" style="font-size:20px">visibility_off</span></button>
      </div>
      <button class="lock-btn primary" onclick="doUnlock()">Unlock</button>
      <div class="lock-error" id="unlockErr"></div>
    </div>

    <div id="createView" style="display:none">
      <div class="lock-input-wrap">
        <input class="lock-input" type="password" id="pwCreate" placeholder="Choose a password" autocomplete="off" oninput="checkStrength()">
        <button class="eye-btn" onclick="toggleVis('pwCreate')"><span class="material-icons-outlined" style="font-size:20px">visibility_off</span></button>
      </div>
      <div class="lock-strength"><div class="lock-strength-bar" id="strengthBar"></div></div>
      <div class="lock-input-wrap" style="margin-top:12px">
        <input class="lock-input" type="password" id="pwConfirm" placeholder="Confirm password" autocomplete="off">
      </div>
      <button class="lock-btn primary" onclick="doCreate()">Create & Encrypt</button>
      <div class="lock-error" id="createErr"></div>
    </div>

    <div class="lock-footer"><span class="material-icons-outlined">lock</span> AES-256-GCM · PBKDF2 · 100K iterations</div>
  </div>
</div>

<!-- ══════ CHANGE PASSWORD DIALOG ══════ -->
<div id="pwDialog">
  <div class="pw-card">
    <h3>Change Password</h3>
    <label>Current password</label>
    <input type="password" id="pwOld">
    <label>New password</label>
    <input type="password" id="pwNew">
    <label>Confirm new password</label>
    <input type="password" id="pwNew2">
    <div class="pw-error" id="pwDlgErr"></div>
    <div class="pw-btns">
      <button class="btn-cancel" onclick="closePwDlg()">Cancel</button>
      <button class="btn-ok" onclick="changePw()">Change</button>
    </div>
  </div>
</div>

<!-- ══════ HEADER ══════ -->
<div class="hdr">
  <div class="hdr-icon"><svg viewBox="0 0 48 48"><rect x="4" y="4" width="40" height="40" rx="4" fill="#0f9d58"/><rect x="11" y="14" width="26" height="3" rx="1" fill="#fff" opacity=".9"/><rect x="11" y="20" width="26" height="3" rx="1" fill="#fff" opacity=".7"/><rect x="11" y="26" width="26" height="3" rx="1" fill="#fff" opacity=".9"/><line x1="22" y1="12" x2="22" y2="37" stroke="#fff" stroke-width="1.5" opacity=".4"/></svg></div>
  <input id="docTitle" value="Untitled spreadsheet" spellcheck="false">
  <div class="hdr-right">
    <button class="sec-badge" id="secBadge" onclick="lockNow()" title="Click to lock">
      <span class="material-icons-outlined">lock_open</span><span>Encrypted</span>
    </button>
    <button class="share-btn"><span class="material-icons-outlined" style="font-size:16px">lock</span>Share</button>
    <div class="avatar">B</div>
  </div>
</div>

<!-- ══════ TOOLBAR ══════ -->
<div class="toolbar">
  <button class="tb-btn" onclick="undo()" title="Undo"><span class="material-icons-outlined">undo</span></button>
  <button class="tb-btn" onclick="redo()" title="Redo"><span class="material-icons-outlined">redo</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="fmt('$')" title="Currency"><b style="font-size:13px">$</b></button>
  <button class="tb-btn" onclick="fmt('%')" title="Percent"><span class="material-icons-outlined">percent</span></button>
  <button class="tb-btn" onclick="fmt('.0')" title="Decrease decimals"><span class="material-icons-outlined" style="font-size:16px">remove</span></button>
  <button class="tb-btn" onclick="fmt('.00')" title="Increase decimals"><span class="material-icons-outlined" style="font-size:16px">add</span></button>
  <div class="tb-sep"></div>
  <select class="tb-select" onchange="styl('fontFamily',this.value)"><option>DM Sans</option><option>Arial</option><option>Georgia</option><option>Courier New</option></select>
  <select class="tb-select" onchange="styl('fontSize',this.value+'px')"><option>10</option><option selected>13</option><option>14</option><option>16</option><option>20</option><option>24</option></select>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="tog('fontWeight','bold','')" title="Bold"><span class="material-icons-outlined">format_bold</span></button>
  <button class="tb-btn" onclick="tog('fontStyle','italic','')" title="Italic"><span class="material-icons-outlined">format_italic</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="styl('color','#cc0000')"><span class="material-icons-outlined" style="color:#cc0000">format_color_text</span></button>
  <button class="tb-btn" onclick="styl('backgroundColor','#fff2cc')"><span class="material-icons-outlined" style="color:#f1c232">format_color_fill</span></button>
  <button class="tb-btn" onclick="styl('backgroundColor','')"><span class="material-icons-outlined">format_color_reset</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="styl('textAlign','left')"><span class="material-icons-outlined">format_align_left</span></button>
  <button class="tb-btn" onclick="styl('textAlign','center')"><span class="material-icons-outlined">format_align_center</span></button>
  <button class="tb-btn" onclick="styl('textAlign','right')"><span class="material-icons-outlined">format_align_right</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="sortCol(1)" title="Sort A-Z"><span class="material-icons-outlined">arrow_upward</span></button>
  <button class="tb-btn" onclick="sortCol(-1)" title="Sort Z-A"><span class="material-icons-outlined">arrow_downward</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" onclick="lockNow()" title="Lock now"><span class="material-icons-outlined">lock</span></button>
  <button class="tb-btn" onclick="openPwDlg()" title="Change password"><span class="material-icons-outlined">key</span></button>
  <button class="tb-btn" onclick="dlCSV()" title="Download CSV"><span class="material-icons-outlined">download</span></button>
</div>

<div class="fbar"><input id="cellRef" value="A1" readonly><div class="fx">fx</div><input id="fxInput" spellcheck="false"></div>
<div class="grid-wrap" id="gridWrap"><table id="tbl"></table><input id="editor"></div>
<div class="tabs" id="tabBar">
  <div class="tab on" data-i="0">Sheet1</div><div class="tab" data-i="1">Sheet2</div><div class="tab" data-i="2">Sheet3</div>
  <button class="tab-add" onclick="addTab()"><span class="material-icons-outlined" style="font-size:16px">add</span></button>
</div>
<div class="status"><span id="sLeft">Ready</span><span id="sRight"></span></div>

<script>
// ══════════════════════════════════════════════════
// ENCRYPTION ENGINE (AES-256-GCM + PBKDF2)
// ══════════════════════════════════════════════════
const STORAGE_KEY = 'secureSheets_v1';
const SALT_KEY = 'secureSheets_salt';
const ITERATIONS = 100000;
let cryptoKey = null; // derived AES key
let currentPassword = null;

async function deriveSalt() {
  let stored = localStorage.getItem(SALT_KEY);
  if (stored) return Uint8Array.from(atob(stored), c => c.charCodeAt(0));
  const salt = crypto.getRandomValues(new Uint8Array(16));
  localStorage.setItem(SALT_KEY, btoa(String.fromCharCode(...salt)));
  return salt;
}

async function deriveKey(password) {
  const enc = new TextEncoder().encode(password);
  const salt = await deriveSalt();
  const base = await crypto.subtle.importKey('raw', enc, 'PBKDF2', false, ['deriveKey']);
  return crypto.subtle.deriveKey(
    { name: 'PBKDF2', salt, iterations: ITERATIONS, hash: 'SHA-256' },
    base,
    { name: 'AES-GCM', length: 256 },
    false,
    ['encrypt', 'decrypt']
  );
}

async function encrypt(data, key) {
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encoded = new TextEncoder().encode(JSON.stringify(data));
  const cipher = await crypto.subtle.encrypt({ name: 'AES-GCM', iv }, key, encoded);
  // Combine iv + ciphertext
  const combined = new Uint8Array(iv.length + cipher.byteLength);
  combined.set(iv);
  combined.set(new Uint8Array(cipher), iv.length);
  return btoa(String.fromCharCode(...combined));
}

async function decrypt(b64, key) {
  const bytes = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const iv = bytes.slice(0, 12);
  const cipher = bytes.slice(12);
  const plain = await crypto.subtle.decrypt({ name: 'AES-GCM', iv }, key, cipher);
  return JSON.parse(new TextDecoder().decode(plain));
}

function hasStoredData() { return !!localStorage.getItem(STORAGE_KEY); }

async function saveEncrypted() {
  if (!cryptoKey) return;
  const payload = { cells, tabStore: tabStore.map(t => t), tabIdx, title: document.getElementById('docTitle').value };
  const b64 = await encrypt(payload, cryptoKey);
  localStorage.setItem(STORAGE_KEY, b64);
  document.getElementById('sLeft').textContent = 'Encrypted & saved · ' + new Date().toLocaleTimeString();
}

async function loadEncrypted(key) {
  const b64 = localStorage.getItem(STORAGE_KEY);
  if (!b64) return null;
  return decrypt(b64, key); // throws on wrong password
}

// ══════════════════════════════════════════════════
// LOCK SCREEN LOGIC
// ══════════════════════════════════════════════════
function setLockMode(mode) {
  document.querySelectorAll('.lock-tab').forEach((t, i) => t.classList.toggle('on', (mode === 'unlock' ? 0 : 1) === i));
  document.getElementById('unlockView').style.display = mode === 'unlock' ? 'block' : 'none';
  document.getElementById('createView').style.display = mode === 'create' ? 'block' : 'none';
}

function toggleVis(id) {
  const inp = document.getElementById(id);
  inp.type = inp.type === 'password' ? 'text' : 'password';
}

function checkStrength() {
  const pw = document.getElementById('pwCreate').value;
  const bar = document.getElementById('strengthBar');
  let score = 0;
  if (pw.length >= 6) score++;
  if (pw.length >= 10) score++;
  if (/[A-Z]/.test(pw) && /[a-z]/.test(pw)) score++;
  if (/\d/.test(pw)) score++;
  if (/[^A-Za-z0-9]/.test(pw)) score++;
  const pct = [0, 20, 40, 60, 80, 100][score];
  const colors = ['#ff4444', '#ff4444', '#ff9900', '#ffcc00', '#88cc00', '#00cc44'];
  bar.style.width = pct + '%';
  bar.style.background = colors[score];
}

async function doUnlock() {
  const pw = document.getElementById('pwUnlock').value;
  if (!pw) { document.getElementById('unlockErr').textContent = 'Enter your password'; return; }
  try {
    const key = await deriveKey(pw);
    const data = await loadEncrypted(key);
    cryptoKey = key;
    currentPassword = pw;
    // Restore state
    if (data) {
      cells = data.cells || {};
      tabStore = data.tabStore || [{}, {}, {}];
      tabIdx = data.tabIdx || 0;
      if (data.title) document.getElementById('docTitle').value = data.title;
    }
    showApp();
  } catch (e) {
    document.getElementById('unlockErr').textContent = 'Wrong password. Try again.';
  }
}

async function doCreate() {
  const pw = document.getElementById('pwCreate').value;
  const pw2 = document.getElementById('pwConfirm').value;
  if (pw.length < 4) { document.getElementById('createErr').textContent = 'Password must be at least 4 characters'; return; }
  if (pw !== pw2) { document.getElementById('createErr').textContent = 'Passwords do not match'; return; }
  // Clear old data
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(SALT_KEY);
  const key = await deriveKey(pw);
  cryptoKey = key;
  currentPassword = pw;
  cells = {};
  tabStore = [{}, {}, {}];
  tabIdx = 0;
  loadDemoData();
  showApp();
  saveEncrypted();
}

function showApp() {
  document.getElementById('lockScreen').classList.add('hidden');
  recalc(); paintAll(); sel(0, 0, false);
  // Auto-save every 5 seconds
  setInterval(saveEncrypted, 5000);
  // Auto-lock after 5 min inactivity
  let idle = 0;
  const resetIdle = () => idle = 0;
  document.addEventListener('mousemove', resetIdle);
  document.addEventListener('keydown', resetIdle);
  setInterval(() => { idle++; if (idle > 300) lockNow(); }, 1000);
}

function lockNow() {
  cryptoKey = null;
  currentPassword = null;
  cells = {};
  // Clear all rendered cells
  document.querySelectorAll('td.c').forEach(td => { td.textContent = ''; td.removeAttribute('style'); });
  document.getElementById('lockScreen').classList.remove('hidden');
  document.getElementById('pwUnlock').value = '';
  document.getElementById('unlockErr').textContent = '';
  setLockMode('unlock');
}

// Init: check if data exists
if (hasStoredData()) {
  setLockMode('unlock');
  document.getElementById('lockTabs').style.display = 'none';
  document.getElementById('lockSubtitle').textContent = 'Enter your password to decrypt your data';
} else {
  setLockMode('create');
  document.getElementById('lockTabs').style.display = 'none';
  document.getElementById('lockTitle').textContent = 'Set Up Encryption';
  document.getElementById('lockSubtitle').textContent = 'Create a password to protect your spreadsheet';
}

// Enter key on password fields
document.getElementById('pwUnlock').addEventListener('keydown', e => { if (e.key === 'Enter') doUnlock(); });
document.getElementById('pwConfirm').addEventListener('keydown', e => { if (e.key === 'Enter') doCreate(); });

// ── Change password dialog ──
function openPwDlg() { document.getElementById('pwDialog').classList.add('show'); }
function closePwDlg() { document.getElementById('pwDialog').classList.remove('show'); document.getElementById('pwDlgErr').textContent = ''; }
async function changePw() {
  const old = document.getElementById('pwOld').value;
  const nw = document.getElementById('pwNew').value;
  const nw2 = document.getElementById('pwNew2').value;
  if (old !== currentPassword) { document.getElementById('pwDlgErr').textContent = 'Current password is wrong'; return; }
  if (nw.length < 4) { document.getElementById('pwDlgErr').textContent = 'New password too short'; return; }
  if (nw !== nw2) { document.getElementById('pwDlgErr').textContent = 'Passwords do not match'; return; }
  localStorage.removeItem(SALT_KEY); // new salt
  cryptoKey = await deriveKey(nw);
  currentPassword = nw;
  await saveEncrypted();
  closePwDlg();
  alert('Password changed and data re-encrypted.');
}

// ══════════════════════════════════════════════════
// SPREADSHEET ENGINE (same as before, compact)
// ══════════════════════════════════════════════════
const R=50,C=26;
let cur=[0,0],anchor=[0,0],selE=[0,0],dragging=false,editMode=false;
let undoStk=[],redoStk=[],clipData=null,clipCut=false;
const colL=c=>String.fromCharCode(65+c),ky=(r,c)=>r+','+c,lbl=(r,c)=>colL(c)+(r+1);
function gc(r,c){return cells[ky(r,c)]||null}
function ensure(r,c){const k=ky(r,c);if(!cells[k])cells[k]={raw:'',val:'',sty:{}};return cells[k]}

!function(){const t=document.getElementById('tbl');let h='<tr><th class="corner"></th>';for(let c=0;c<C;c++)h+=`<th class="ch" data-c="${c}">${colL(c)}</th>`;h+='</tr>';for(let r=0;r<R;r++){h+=`<tr><td class="rh" data-r="${r}">${r+1}</td>`;for(let c=0;c<C;c++)h+=`<td class="c" data-r="${r}" data-c="${c}"></td>`;h+='</tr>';}t.innerHTML=h;}();

function evaluate(raw){if(typeof raw!=='string'||raw==='')return'';if(!raw.startsWith('='))return raw;try{let e=raw.substring(1).trim();e=e.replace(/([A-Z])(\d+):([A-Z])(\d+)/gi,(_,c1,r1,c2,r2)=>{const mR=Math.min(+r1,+r2)-1,xR=Math.max(+r1,+r2)-1,mC=Math.min(c1.toUpperCase().charCodeAt(0),c2.toUpperCase().charCodeAt(0))-65,xC=Math.max(c1.toUpperCase().charCodeAt(0),c2.toUpperCase().charCodeAt(0))-65;const v=[];for(let r=mR;r<=xR;r++)for(let c=mC;c<=xC;c++){const cl=gc(r,c);const n=cl?parseFloat(cl.val):NaN;v.push(isNaN(n)?0:n);}return'['+v.join(',')+']';});e=e.replace(/\b([A-Z])(\d+)\b/gi,(_,col,row)=>{const r=parseInt(row)-1,c=col.toUpperCase().charCodeAt(0)-65;if(r<0||r>=R||c<0||c>=C)return'0';const cl=gc(r,c);const v=cl?cl.val:'';const n=parseFloat(v);return isNaN(n)?'0':String(n);});const af=(nm,fn)=>{const r1=new RegExp(nm+'\\s*\\(\\s*\\[([^\\]]*)\\]\\s*\\)','gi');e=e.replace(r1,(_,n)=>fn(n.split(',').map(Number).filter(n=>!isNaN(n))));const r2=new RegExp(nm+'\\s*\\(([^)]+)\\)','gi');e=e.replace(r2,(_,n)=>fn(n.split(',').map(Number).filter(n=>!isNaN(n))));};af('SUM',a=>a.reduce((s,v)=>s+v,0));af('AVERAGE',a=>a.length?a.reduce((s,v)=>s+v,0)/a.length:0);af('COUNT',a=>a.length);af('MAX',a=>a.length?Math.max(...a):0);af('MIN',a=>a.length?Math.min(...a):0);e=e.replace(/ABS\s*\(([^)]+)\)/gi,(_,v)=>Math.abs(eval(v)));e=e.replace(/SQRT\s*\(([^)]+)\)/gi,(_,v)=>Math.sqrt(eval(v)));e=e.replace(/ROUND\s*\(([^,]+),\s*(\d+)\)/gi,(_,v,d)=>parseFloat(eval(v)).toFixed(+d));e=e.replace(/ROUND\s*\(([^)]+)\)/gi,(_,v)=>Math.round(eval(v)));e=e.replace(/POWER\s*\(([^,]+),\s*([^)]+)\)/gi,(_,b,ex)=>Math.pow(eval(b),eval(ex)));e=e.replace(/PI\s*\(\s*\)/gi,()=>Math.PI);e=e.replace(/IF\s*\(([^,]+),([^,]+),([^)]+)\)/gi,(_,co,t,f)=>eval(co)?eval(t):eval(f));e=e.replace(/\^/g,'**');let r=eval(e);if(typeof r==='number'){if(!isFinite(r))return'#DIV/0!';r=Math.round(r*1e12)/1e12;}return String(r);}catch(ex){return'#ERROR!';}}
function recalc(){for(let p=0;p<3;p++)for(const k in cells){const c=cells[k];if(c.raw&&c.raw.startsWith('='))c.val=evaluate(c.raw);}}
function setCell(r,c,raw){const cl=ensure(r,c);cl.raw=raw;cl.val=raw===''?'':(raw.startsWith('=')?evaluate(raw):raw);}
function paint(r,c){const td=document.querySelector(`td.c[data-r="${r}"][data-c="${c}"]`);if(!td)return;const cl=gc(r,c);if(!cl){td.textContent='';td.removeAttribute('style');return;}td.textContent=cl.val;const s=cl.sty;for(const p in s)if(s[p])td.style[p]=s[p];else td.style.removeProperty(p);if(!s.textAlign&&cl.val!==''&&!isNaN(parseFloat(cl.val))&&isFinite(cl.val))td.style.textAlign='right';}
function paintAll(){document.querySelectorAll('td.c').forEach(td=>{td.textContent='';td.removeAttribute('style')});for(const k in cells){const[r,c]=k.split(',').map(Number);paint(r,c);}}

function sel(r,c,multi){cur=[r,c];if(!multi){anchor=[r,c];selE=[r,c];}else selE=[r,c];paintSel();document.getElementById('cellRef').value=lbl(r,c);const cl=gc(r,c);document.getElementById('fxInput').value=cl?cl.raw:'';calcSt();}
function paintSel(){document.querySelectorAll('td.c.sel,td.c.inr').forEach(el=>el.classList.remove('sel','inr'));document.querySelectorAll('th.ch.hl,td.rh.hl').forEach(el=>el.classList.remove('hl'));const[r1,c1]=[Math.min(anchor[0],selE[0]),Math.min(anchor[1],selE[1])];const[r2,c2]=[Math.max(anchor[0],selE[0]),Math.max(anchor[1],selE[1])];for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){const td=document.querySelector(`td.c[data-r="${r}"][data-c="${c}"]`);if(td)td.classList.add(r===cur[0]&&c===cur[1]?'sel':'inr');}for(let c=c1;c<=c2;c++){const th=document.querySelector(`th.ch[data-c="${c}"]`);if(th)th.classList.add('hl');}for(let r=r1;r<=r2;r++){const rh=document.querySelector(`td.rh[data-r="${r}"]`);if(rh)rh.classList.add('hl');}}
function sRange(){return{r1:Math.min(anchor[0],selE[0]),c1:Math.min(anchor[1],selE[1]),r2:Math.max(anchor[0],selE[0]),c2:Math.max(anchor[1],selE[1])};}
function calcSt(){const{r1,c1,r2,c2}=sRange();let sum=0,cnt=0,nc=0;for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){const cl=gc(r,c);if(cl&&cl.val!==''){cnt++;const n=parseFloat(cl.val);if(!isNaN(n)){sum+=n;nc++;}}}const p=[];if(nc){p.push('Sum: '+Math.round(sum*100)/100);p.push('Avg: '+Math.round(sum/nc*100)/100);}if(cnt)p.push('Count: '+cnt);document.getElementById('sRight').textContent=p.join('    ');}

document.getElementById('tbl').addEventListener('mousedown',e=>{const td=e.target.closest('td.c');if(!td)return;closeEd(true);dragging=true;anchor=[+td.dataset.r,+td.dataset.c];sel(+td.dataset.r,+td.dataset.c,e.shiftKey);});
document.addEventListener('mousemove',e=>{if(!dragging)return;const el=document.elementFromPoint(e.clientX,e.clientY);if(el&&el.classList.contains('c')){selE=[+el.dataset.r,+el.dataset.c];paintSel();calcSt();}});
document.addEventListener('mouseup',()=>dragging=false);
document.getElementById('tbl').addEventListener('dblclick',e=>{const td=e.target.closest('td.c');if(td)openEd(+td.dataset.r,+td.dataset.c);});

const edEl=document.getElementById('editor');
function openEd(r,c){editMode=true;cur=[r,c];const td=document.querySelector(`td.c[data-r="${r}"][data-c="${c}"]`);const wrap=document.getElementById('gridWrap'),wr=wrap.getBoundingClientRect(),tr=td.getBoundingClientRect();edEl.style.left=(tr.left-wr.left+wrap.scrollLeft)+'px';edEl.style.top=(tr.top-wr.top+wrap.scrollTop)+'px';edEl.style.width=Math.max(tr.width+2,100)+'px';edEl.style.height=(tr.height+2)+'px';edEl.style.display='block';const cl=gc(r,c);edEl.value=cl?cl.raw:'';edEl.focus();edEl.select();document.getElementById('fxInput').value=edEl.value;}
function closeEd(save){if(!editMode)return;if(save){pushU();setCell(cur[0],cur[1],edEl.value);recalc();paintAll();paintSel();}editMode=false;edEl.style.display='none';}
edEl.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();closeEd(true);mv(1,0);}else if(e.key==='Tab'){e.preventDefault();closeEd(true);mv(0,e.shiftKey?-1:1);}else if(e.key==='Escape')closeEd(false);});
edEl.addEventListener('input',()=>document.getElementById('fxInput').value=edEl.value);
const fxIn=document.getElementById('fxInput');
fxIn.addEventListener('keydown',e=>{if(e.key==='Enter'){e.preventDefault();pushU();setCell(cur[0],cur[1],fxIn.value);recalc();paintAll();paintSel();fxIn.blur();}if(e.key==='Escape'){const cl=gc(cur[0],cur[1]);fxIn.value=cl?cl.raw:'';fxIn.blur();}});

function mv(dr,dc,shift){const r=Math.max(0,Math.min(R-1,cur[0]+dr)),c=Math.max(0,Math.min(C-1,cur[1]+dc));if(!shift)anchor=[r,c];sel(r,c,shift);document.querySelector(`td.c[data-r="${r}"][data-c="${c}"]`)?.scrollIntoView({block:'nearest',inline:'nearest'});}
document.addEventListener('keydown',e=>{if(document.getElementById('lockScreen').classList.contains('hidden')===false)return;if(editMode)return;if(e.target===fxIn||e.target.id==='docTitle')return;const nav={ArrowUp:[-1,0],ArrowDown:[1,0],ArrowLeft:[0,-1],ArrowRight:[0,1]};if(nav[e.key]){e.preventDefault();mv(nav[e.key][0],nav[e.key][1],e.shiftKey);return;}if(e.key==='Tab'){e.preventDefault();mv(0,e.shiftKey?-1:1);return;}if(e.key==='Enter'){e.preventDefault();openEd(cur[0],cur[1]);return;}if(e.key==='F2'){e.preventDefault();openEd(cur[0],cur[1]);return;}if(e.key==='Delete'||e.key==='Backspace'){e.preventDefault();pushU();clrSel();return;}if(e.ctrlKey||e.metaKey){if(e.key==='z'){e.preventDefault();undo();return;}if(e.key==='y'){e.preventDefault();redo();return;}if(e.key==='c'){copy();return;}if(e.key==='x'){cut();return;}if(e.key==='v'){e.preventDefault();paste();return;}if(e.key==='b'){e.preventDefault();tog('fontWeight','bold','');return;}if(e.key==='i'){e.preventDefault();tog('fontStyle','italic','');return;}if(e.key==='l'){e.preventDefault();lockNow();return;}return;}if(e.key.length===1&&!e.altKey){openEd(cur[0],cur[1]);edEl.value='';}});

function pushU(){undoStk.push(JSON.stringify(cells));redoStk=[];if(undoStk.length>40)undoStk.shift();}
function undo(){if(!undoStk.length)return;redoStk.push(JSON.stringify(cells));cells=JSON.parse(undoStk.pop());paintAll();paintSel();}
function redo(){if(!redoStk.length)return;undoStk.push(JSON.stringify(cells));cells=JSON.parse(redoStk.pop());paintAll();paintSel();}

function copy(){const{r1,c1,r2,c2}=sRange();clipData=[];clipCut=false;for(let r=r1;r<=r2;r++){const row=[];for(let c=c1;c<=c2;c++){const cl=gc(r,c);row.push(cl?{raw:cl.raw,val:cl.val,sty:{...cl.sty}}:null);}clipData.push(row);}}
function cut(){copy();clipCut=true;}
function paste(){if(!clipData)return;pushU();for(let r=0;r<clipData.length;r++)for(let c=0;c<clipData[r].length;c++){const tr=cur[0]+r,tc=cur[1]+c;if(tr>=R||tc>=C)continue;const s=clipData[r][c];if(s){const cl=ensure(tr,tc);cl.raw=s.raw;cl.val=s.val;cl.sty={...s.sty};}else delete cells[ky(tr,tc)];}if(clipCut){const{r1,c1,r2,c2}=sRange();for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)delete cells[ky(r,c)];clipCut=false;}recalc();paintAll();paintSel();}
function clrSel(){const{r1,c1,r2,c2}=sRange();for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++)delete cells[ky(r,c)];recalc();paintAll();paintSel();}
function styl(p,v){pushU();const{r1,c1,r2,c2}=sRange();for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){ensure(r,c).sty[p]=v;paint(r,c);}}
function tog(p,on,off){const cl=gc(cur[0],cur[1]);styl(p,cl?.sty?.[p]===on?off:on);}
function fmt(t){pushU();const{r1,c1,r2,c2}=sRange();for(let r=r1;r<=r2;r++)for(let c=c1;c<=c2;c++){const cl=gc(r,c);if(!cl)continue;const n=parseFloat(cl.val);if(isNaN(n))continue;if(t==='$')cl.val='$'+n.toFixed(2);else if(t==='%')cl.val=(n*100).toFixed(1)+'%';else if(t==='.0')cl.val=Math.round(n).toString();else if(t==='.00')cl.val=n.toFixed(2);paint(r,c);}}
function sortCol(dir){pushU();const cc=cur[1];const rows=[];for(let r=0;r<R;r++){const cl=gc(r,cc);if(cl&&cl.val!=='')rows.push(r);}if(!rows.length)return;const rd=rows.map(r=>{const d={};for(let c=0;c<C;c++){const cl=gc(r,c);if(cl)d[c]=JSON.parse(JSON.stringify(cl));}return d;});rd.sort((a,b)=>{const va=a[cc]?.val||'',vb=b[cc]?.val||'';const na=parseFloat(va),nb=parseFloat(vb);if(!isNaN(na)&&!isNaN(nb))return(na-nb)*dir;return String(va).localeCompare(String(vb))*dir;});for(let i=0;i<rows.length;i++){const r=rows[i];for(let c=0;c<C;c++){const k=ky(r,c);if(rd[i][c])cells[k]=rd[i][c];else delete cells[k];}}paintAll();paintSel();}

function switchTab(idx){tabStore[tabIdx]=JSON.parse(JSON.stringify(cells));tabIdx=idx;cells=tabStore[idx]?JSON.parse(JSON.stringify(tabStore[idx])):{};paintAll();sel(0,0,false);document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('on',+t.dataset.i===idx));}
document.getElementById('tabBar').addEventListener('click',e=>{const t=e.target.closest('.tab');if(t&&t.dataset.i!==undefined)switchTab(+t.dataset.i);});
function addTab(){const i=tabStore.length;tabStore.push({});const t=document.createElement('div');t.className='tab';t.dataset.i=i;t.textContent='Sheet'+(i+1);document.querySelector('.tab-add').before(t);switchTab(i);}

function dlCSV(){let mR=0,mC=0;for(const k in cells){const[r,c]=k.split(',').map(Number);mR=Math.max(mR,r);mC=Math.max(mC,c);}let csv='';for(let r=0;r<=mR;r++){const row=[];for(let c=0;c<=mC;c++){const cl=gc(r,c);let v=cl?cl.val:'';if(typeof v==='string'&&(v.includes(',')||v.includes('"')))v='"'+v.replace(/"/g,'""')+'"';row.push(v);}csv+=row.join(',')+'\n';}const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([csv],{type:'text/csv'}));a.download=(document.getElementById('docTitle').value||'sheet')+'.csv';a.click();}

function loadDemoData(){const hS={fontWeight:'bold',backgroundColor:'#e8f0fe'};const demo=[[0,0,'Item'],[0,1,'Q1'],[0,2,'Q2'],[0,3,'Q3'],[0,4,'Q4'],[0,5,'Total'],[1,0,'Widgets'],[1,1,'1200'],[1,2,'1450'],[1,3,'1100'],[1,4,'1680'],[1,5,'=SUM(B2:E2)'],[2,0,'Gadgets'],[2,1,'800'],[2,2,'920'],[2,3,'1050'],[2,4,'870'],[2,5,'=SUM(B3:E3)'],[3,0,'Gizmos'],[3,1,'2100'],[3,2,'1980'],[3,3,'2340'],[3,4,'2150'],[3,5,'=SUM(B4:E4)'],[4,0,'Total'],[4,1,'=SUM(B2:B4)'],[4,2,'=SUM(C2:C4)'],[4,3,'=SUM(D2:D4)'],[4,4,'=SUM(E2:E4)'],[4,5,'=SUM(B5:E5)'],[5,0,'Average'],[5,1,'=AVERAGE(B2:B4)'],[5,2,'=AVERAGE(C2:C4)']];demo.forEach(([r,c,v])=>{setCell(r,c,v);if(r===0||c===0)ensure(r,c).sty={...hS};});for(let c=0;c<=5;c++)if(gc(4,c))ensure(4,c).sty={...hS};}
</script>
