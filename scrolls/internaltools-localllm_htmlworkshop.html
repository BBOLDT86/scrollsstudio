<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Local LLM HTML Workshop</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600;700&amp;family=Instrument+Serif:ital@0;1&amp;display=swap" rel="stylesheet">
<style>
:root{
--bg:#0a0a0c;--surface:#111114;--surface-2:#18181c;--border:#2a2a30;--border-focus:#4a6cf7;--text:#e8e8ec;--text-dim:#7a7a88;--accent:#4a6cf7;--accent-glow:rgba(74,108,247,.15);--success:#34d399;--error:#f87171;--warning:#fbbf24;--radius:10px
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
.app{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:40px 24px 60px}
header{margin-bottom:48px}
header h1{font-family:'Instrument Serif',serif;font-size:2.8rem;font-weight:400;letter-spacing:-.02em;background:linear-gradient(135deg,#e8e8ec 0%,#7a7a88 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
header p{font-size:.8rem;color:var(--text-dim);font-weight:300;letter-spacing:.05em;text-transform:uppercase}
.config-bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:32px;padding:20px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}
label{display:block;font-size:.65rem;text-transform:uppercase;letter-spacing:.1em;color:var(--text-dim);margin-bottom:6px}
input,select{width:100%;padding:10px 14px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.8rem}
input:focus,select:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-glow)}
.save-btn{align-self:end;padding:10px 20px;background:var(--surface-2);border:1px solid var(--border);border-radius:6px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;cursor:pointer}
.workspace{display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:20px}
.panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;display:flex;flex-direction:column}
.panel-header{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);background:var(--surface-2)}
.panel-title{font-size:.7rem;text-transform:uppercase;letter-spacing:.12em;color:var(--text-dim);display:flex;align-items:center;gap:8px}
.panel-body{padding:18px;flex:1}
.drop-zone{border:2px dashed var(--border);border-radius:8px;padding:30px 20px;text-align:center;cursor:pointer;transition:.3s;min-height:160px;display:flex;flex-direction:column;gap:8px;justify-content:center}
.drop-zone:hover{border-color:var(--accent);background:var(--accent-glow)}
.file-list{margin-top:12px;font-size:.72rem;text-align:left;max-height:160px;overflow:auto}
.file-item{padding:4px 0;border-bottom:1px solid var(--border)}
.code-preview{margin-top:12px;max-height:200px;overflow:auto;background:var(--bg);border-radius:6px;padding:12px;font-size:.7rem;line-height:1.6;color:var(--text-dim);white-space:pre-wrap;word-break:break-all}
.query-area{width:100%;min-height:260px;padding:16px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.82rem;line-height:1.7;resize:vertical}
.sys-prompt{width:100%;min-height:80px;padding:12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'JetBrains Mono',monospace;font-size:.75rem;margin-bottom:12px}
.action-bar{display:flex;gap:12px}
.send-btn{flex:1;padding:16px 32px;background:var(--accent);border:none;border-radius:var(--radius);color:#fff;font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:600;cursor:pointer}
.status-bar{margin-top:16px;padding:12px 16px;border-radius:8px;font-size:.75rem;display:none}
.status-bar.visible{display:block}
.output-section{margin-top:24px}
.output-preview{width:100%;min-height:400px;border:none;background:#fff;border-radius:6px}
.output-code{min-height:400px;max-height:600px;overflow:auto;background:var(--bg);border-radius:6px;padding:16px;font-size:.75rem;white-space:pre-wrap}
.hidden{display:none!important}
</style>
<style>:is([id*='google_ads_iframe'],[id*='taboola-'],.taboolaHeight,.taboola-placeholder,#top-ad,#credential_picker_container,#credentials-picker-container,#credential_picker_iframe,[id*='google-one-tap-iframe'],#google-one-tap-popup-container,.google-one-tap__module,.google-one-tap-modal-div,#amp_floatingAdDiv,#ez-content-blocker-container) {display:none!important;min-height:0!important;height:0!important;}</style></head>
<body>
<div class="app">

<header>
<h1>Local LLM — HTML Workshop</h1>
<p>Upload multiple HTML files · describe cross‑file changes · get transformed output</p>
</header>

<div class="config-bar">
<div>
<label>LLM Studio Server URL</label>
<input id="endpoint" type="text" placeholder="http://localhost:1234/v1" data-ddg-inputtype="unknown">
</div>
<div>
<label>Model</label>
<input id="modelInput" type="text" placeholder="local-model" data-ddg-inputtype="unknown">
</div>
</div>

<div class="workspace">

<div class="panel">
<div class="panel-header">
<span class="panel-title">Source Files</span>
</div>
<div class="panel-body">

<div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
Drop HTML files here or click to upload
<input type="file" id="fileInput" accept=".html,.htm" multiple="" style="display:none">
</div>

<div class="file-list" id="fileList"></div>
<div class="code-preview hidden" id="codePreview"></div>

</div>
</div>

<div class="panel">
<div class="panel-header">
<span class="panel-title">Instructions</span>
</div>
<div class="panel-body">

<textarea class="sys-prompt" id="sysPrompt">You are an expert HTML developer. The user will provide MULTIPLE HTML files and instructions. They may reference files by name (example: "make pageA.html use the styling from layout.html"). Return ONLY the complete modified HTML for the main requested file unless the user explicitly asks for multiple files. Output raw HTML only.</textarea>

<textarea class="query-area" id="queryInput" placeholder="Example: make index.html use the styles from dashboard.html"></textarea>

</div>
</div>

</div>

<div class="action-bar">
<button class="send-btn" id="sendBtn" onclick="sendToLLM()" disabled="">Send to Local LLM</button>
</div>

<div class="status-bar" id="statusBar"></div>

<div class="output-section hidden" id="outputSection">
<div class="panel">
<div class="panel-header">
<span class="panel-title">Output</span>
</div>
<div class="panel-body">
<iframe class="output-preview" id="outputPreview"></iframe>
<div class="output-code hidden" id="outputCode"></div>
</div>
</div>
</div>

</div>

<script>
let filesHTML={}
let outputHTML=''

const dropZone=document.getElementById('dropZone')
const fileInput=document.getElementById('fileInput')
const fileList=document.getElementById('fileList')

dropZone.addEventListener('dragover',e=>{e.preventDefault()})
dropZone.addEventListener('drop',e=>{
e.preventDefault()
handleFiles(e.dataTransfer.files)
})

fileInput.addEventListener('change',e=>{
handleFiles(e.target.files)
})

function handleFiles(files){
for(const file of files){
const reader=new FileReader()
reader.onload=e=>{
filesHTML[file.name]=e.target.result
renderFileList()
updatePreview()
updateSendState()
}
reader.readAsText(file)
}
}

function renderFileList(){
fileList.innerHTML=''
Object.keys(filesHTML).forEach(name=>{
const div=document.createElement('div')
div.className='file-item'
div.textContent=name
fileList.appendChild(div)
})
}

function updatePreview(){
const first=Object.values(filesHTML)[0]
if(!first)return
const preview=document.getElementById('codePreview')
preview.classList.remove('hidden')
preview.textContent=first.substring(0,1500)
}

function updateSendState(){
const ready=Object.keys(filesHTML).length>0 && document.getElementById('queryInput').value.trim().length>0
document.getElementById('sendBtn').disabled=!ready
}

document.getElementById('queryInput').addEventListener('input',updateSendState)

async function sendToLLM(){

const endpoint=document.getElementById('endpoint').value.trim().replace(/\/+$/,'')
const model=document.getElementById('modelInput').value.trim()
const query=document.getElementById('queryInput').value.trim()
const sys=document.getElementById('sysPrompt').value.trim()

let fileBlock=''
for(const [name,html] of Object.entries(filesHTML)){
fileBlock+=`FILE: ${name}\n\`\`\`html\n${html}\n\`\`\`\n\n`
}

const userMessage=`Here are the project files:\n\n${fileBlock}\nInstructions: ${query}`

showStatus('Processing...')

try{

const res=await fetch(`${endpoint}/chat/completions`,{
method:'POST',
headers:{
'Content-Type':'application/json'
},
body:JSON.stringify({
model:model,
messages:[
{role:"system",content:sys},
{role:"user",content:userMessage}
],
temperature:0
})
})

const data=await res.json()

let raw=data.choices?.[0]?.message?.content || ''

raw=raw.replace(/^```html/i,'').replace(/```$/,'').trim()

outputHTML=raw

document.getElementById('outputSection').classList.remove('hidden')
document.getElementById('outputPreview').srcdoc=outputHTML
document.getElementById('outputCode').textContent=outputHTML

showStatus('Done')

}catch(e){
showStatus('Error: '+e.message)
}

}

function showStatus(msg){
const bar=document.getElementById('statusBar')
bar.textContent=msg
bar.classList.add('visible')
setTimeout(()=>bar.classList.remove('visible'),5000)
}
</script>


</body></html>
