<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deliciousness Cookbook</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Source+Sans+3:wght@300;400;600;700&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #faf6f1;
  --bg-card: #ffffff;
  --text: #2c2416;
  --text-muted: #8a7e6f;
  --accent: #c4693d;
  --accent-light: #e8a97e;
  --accent-dark: #9e4a24;
  --green: #5a7247;
  --green-light: #e8edd4;
  --border: #e5ddd3;
  --shadow: rgba(44, 36, 22, 0.08);
  --shadow-heavy: rgba(44, 36, 22, 0.15);
  --tag-bg: #f0ebe4;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html { scroll-behavior: smooth; }

body {
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  -webkit-font-smoothing: antialiased;
}

/* ─── HEADER ─── */
.hero {
  position: relative;
  padding: 3rem 2rem 2rem;
  text-align: center;
  background: linear-gradient(135deg, #2c2416 0%, #4a3928 50%, #3d2e1c 100%);
  color: #faf6f1;
  overflow: hidden;
}
.hero::before {
  content: '';
  position: absolute; inset: 0;
  background: url("data:image/svg+xml,%3Csvg width='60' height='60' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M30 0v60M0 30h60' stroke='%23ffffff' stroke-width='0.3' opacity='0.06'/%3E%3C/svg%3E");
  pointer-events: none;
}
.hero h1 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(2.4rem, 6vw, 4rem);
  font-weight: 900;
  letter-spacing: -0.02em;
  margin-bottom: 0.25rem;
  position: relative;
}
.hero .subtitle {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  opacity: 0.6;
  margin-bottom: 1.5rem;
  position: relative;
}
.hero .author {
  font-family: 'Playfair Display', serif;
  font-style: italic;
  font-size: 1rem;
  opacity: 0.5;
  position: relative;
}

/* ─── NAV / SEARCH ─── */
.nav-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 0.75rem 1.5rem;
  display: flex;
  align-items: center;
  gap: 1rem;
  backdrop-filter: blur(10px);
  box-shadow: 0 2px 12px var(--shadow);
}
.search-wrap {
  flex: 1;
  max-width: 420px;
  position: relative;
}
.search-wrap svg {
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  width: 18px; height: 18px;
  stroke: var(--text-muted);
  fill: none;
  stroke-width: 2;
}
.search-wrap input {
  width: 100%;
  padding: 0.6rem 0.75rem 0.6rem 2.5rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  font-family: 'Source Sans 3', sans-serif;
  background: var(--bg-card);
  color: var(--text);
  transition: border-color 0.2s, box-shadow 0.2s;
}
.search-wrap input:focus {
  outline: none;
  border-color: var(--accent);
  box-shadow: 0 0 0 3px rgba(196, 105, 61, 0.15);
}
.search-wrap input::placeholder { color: var(--text-muted); }
.recipe-count {
  font-family: 'DM Mono', monospace;
  font-size: 0.75rem;
  color: var(--text-muted);
  white-space: nowrap;
}

/* ─── CATEGORY TABS ─── */
.cat-tabs {
  display: flex;
  gap: 0.5rem;
  padding: 0.75rem 1.5rem;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none;
}
.cat-tabs::-webkit-scrollbar { display: none; }
.cat-tab {
  flex-shrink: 0;
  padding: 0.4rem 1rem;
  border: 1px solid var(--border);
  border-radius: 100px;
  font-size: 0.8rem;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  background: var(--bg-card);
  color: var(--text-muted);
  user-select: none;
}
.cat-tab:hover { border-color: var(--accent-light); color: var(--text); }
.cat-tab.active {
  background: var(--accent);
  color: #fff;
  border-color: var(--accent);
}

/* ─── GRID ─── */
.grid-container {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.5rem;
}
.recipe-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 1.25rem;
}
.recipe-card {
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1.25rem 1.5rem;
  cursor: pointer;
  transition: all 0.25s ease;
  position: relative;
  overflow: hidden;
}
.recipe-card::before {
  content: '';
  position: absolute;
  top: 0; left: 0;
  width: 4px;
  height: 100%;
  background: var(--accent);
  transform: scaleY(0);
  transform-origin: bottom;
  transition: transform 0.3s ease;
}
.recipe-card:hover {
  border-color: var(--accent-light);
  box-shadow: 0 8px 30px var(--shadow);
  transform: translateY(-2px);
}
.recipe-card:hover::before { transform: scaleY(1); }
.recipe-card .card-cat {
  font-family: 'DM Mono', monospace;
  font-size: 0.65rem;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.4rem;
}
.recipe-card h3 {
  font-family: 'Playfair Display', serif;
  font-size: 1.15rem;
  font-weight: 700;
  line-height: 1.3;
  margin-bottom: 0.4rem;
}
.recipe-card .card-desc {
  font-size: 0.82rem;
  color: var(--text-muted);
  line-height: 1.5;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.recipe-card .card-tags {
  display: flex;
  flex-wrap: wrap;
  gap: 0.35rem;
  margin-top: 0.65rem;
}
.recipe-card .card-tags span {
  font-size: 0.68rem;
  padding: 0.15rem 0.5rem;
  background: var(--tag-bg);
  border-radius: 4px;
  color: var(--text-muted);
}

/* ─── EMPTY STATE ─── */
.empty-state {
  text-align: center;
  padding: 4rem 2rem;
  color: var(--text-muted);
}
.empty-state .icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
.empty-state p { font-size: 1rem; }

/* ─── MODAL ─── */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(44, 36, 22, 0.5);
  backdrop-filter: blur(4px);
  z-index: 500;
  justify-content: center;
  align-items: flex-start;
  padding: 2rem 1rem;
  overflow-y: auto;
}
.modal-overlay.open { display: flex; }
.modal {
  background: var(--bg-card);
  border-radius: 16px;
  max-width: 700px;
  width: 100%;
  margin: 2rem auto;
  box-shadow: 0 24px 80px rgba(44, 36, 22, 0.25);
  animation: modalIn 0.3s ease;
  position: relative;
}
@keyframes modalIn {
  from { opacity: 0; transform: translateY(20px) scale(0.97); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
.modal-header {
  padding: 2rem 2rem 1rem;
  border-bottom: 1px solid var(--border);
}
.modal-header .modal-cat {
  font-family: 'DM Mono', monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.5rem;
}
.modal-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: 1.8rem;
  font-weight: 900;
  line-height: 1.2;
}
.modal-header .modal-desc {
  margin-top: 0.5rem;
  font-size: 0.9rem;
  color: var(--text-muted);
  line-height: 1.6;
}
.modal-close {
  position: absolute;
  top: 1.25rem;
  right: 1.25rem;
  width: 36px; height: 36px;
  border: 1px solid var(--border);
  border-radius: 50%;
  background: var(--bg-card);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 1.1rem;
  color: var(--text-muted);
  transition: all 0.2s;
}
.modal-close:hover { background: var(--tag-bg); color: var(--text); }
.modal-body {
  padding: 1.5rem 2rem 2rem;
}
.modal-body h4 {
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 0.75rem;
  margin-top: 1.5rem;
}
.modal-body h4:first-child { margin-top: 0; }
.modal-body ul {
  list-style: none;
  padding: 0;
}
.modal-body ul li {
  padding: 0.3rem 0;
  font-size: 0.9rem;
  line-height: 1.5;
  position: relative;
  padding-left: 1.25rem;
}
.modal-body ul li::before {
  content: '•';
  position: absolute;
  left: 0;
  color: var(--accent-light);
  font-weight: 700;
}
.modal-body ol {
  padding-left: 0;
  counter-reset: step;
  list-style: none;
}
.modal-body ol li {
  padding: 0.5rem 0 0.5rem 2.5rem;
  font-size: 0.9rem;
  line-height: 1.6;
  position: relative;
  border-bottom: 1px solid var(--tag-bg);
  counter-increment: step;
}
.modal-body ol li:last-child { border-bottom: none; }
.modal-body ol li::before {
  content: counter(step);
  position: absolute;
  left: 0;
  top: 0.5rem;
  width: 1.75rem;
  height: 1.75rem;
  background: var(--green-light);
  color: var(--green);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'DM Mono', monospace;
  font-size: 0.72rem;
  font-weight: 700;
}
.modal-notes {
  margin-top: 1.5rem;
  padding: 1rem 1.25rem;
  background: var(--tag-bg);
  border-radius: 8px;
  font-size: 0.85rem;
  color: var(--text-muted);
  line-height: 1.6;
  border-left: 3px solid var(--accent-light);
}
.modal-notes strong { color: var(--text); }

/* ─── RESPONSIVE ─── */
@media (max-width: 600px) {
  .hero { padding: 2rem 1.25rem 1.5rem; }
  .nav-bar { padding: 0.6rem 1rem; }
  .cat-tabs { padding: 0.6rem 1rem; }
  .grid-container { padding: 1rem; }
  .recipe-grid { grid-template-columns: 1fr; }
  .modal-header, .modal-body { padding-left: 1.25rem; padding-right: 1.25rem; }
  .modal-header h2 { font-size: 1.4rem; }
}

/* ─── AI SETTINGS BUTTON ─── */
.ai-cfg-btn { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 8px; background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; flex-shrink: 0; position: relative; }
.ai-cfg-btn:hover { border-color: var(--accent-light); background: var(--tag-bg); }
.ai-cfg-btn svg { width: 18px; height: 18px; stroke: var(--text-muted); fill: none; stroke-width: 2; }
.ai-cfg-btn.connected::after { content: ''; position: absolute; top: 4px; right: 4px; width: 8px; height: 8px; background: var(--green); border-radius: 50%; border: 2px solid var(--bg-card); }

/* ─── AI COMMAND BAR ─── */
.ai-bar-wrap { max-width: 1200px; margin: 0 auto; padding: 0.75rem 1.5rem 0; }
.ai-bar { display: flex; gap: 0.5rem; align-items: center; background: var(--bg-card); border: 1px solid var(--border); border-radius: 12px; padding: 0.5rem 0.5rem 0.5rem 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
.ai-bar:focus-within { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,105,61,0.1); }
.ai-bar .ai-icon { flex-shrink: 0; width: 24px; height: 24px; background: linear-gradient(135deg, var(--accent), var(--accent-dark)); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 0.7rem; font-weight: 700; font-family: 'DM Mono', monospace; }
.ai-bar input { flex: 1; border: none; outline: none; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif; background: transparent; color: var(--text); min-width: 0; }
.ai-bar input::placeholder { color: var(--text-muted); }
.ai-bar button { flex-shrink: 0; padding: 0.45rem 1rem; background: var(--accent); color: #fff; border: none; border-radius: 8px; font-size: 0.8rem; font-weight: 600; font-family: 'Source Sans 3', sans-serif; cursor: pointer; transition: background 0.2s; }
.ai-bar button:hover { background: var(--accent-dark); }
.ai-bar button:disabled { background: var(--border); color: var(--text-muted); cursor: not-allowed; }
.ai-status { max-width: 1200px; margin: 0 auto; padding: 0.25rem 1.5rem 0; font-family: 'DM Mono', monospace; font-size: 0.7rem; color: var(--text-muted); min-height: 1.2rem; }
.ai-status.error { color: #c0392b; }
.ai-status.success { color: var(--green); }

/* ─── AI Card Markers ─── */
.recipe-card.ai-gen { border-color: var(--accent-light); }
.recipe-card.ai-gen .card-cat::after { content: ' \00b7  AI'; color: var(--green); font-weight: 400; }
.recipe-card .card-del { position: absolute; top: 8px; right: 8px; width: 24px; height: 24px; border: none; background: rgba(192,57,43,0.08); border-radius: 50%; color: #c0392b; font-size: 0.75rem; cursor: pointer; display: none; align-items: center; justify-content: center; z-index: 2; }
.recipe-card .card-del:hover { background: rgba(192,57,43,0.18); }
.recipe-card.ai-gen:hover .card-del { display: flex; }

/* ─── Settings Modal ─── */
.sett-overlay { display: none; position: fixed; inset: 0; background: rgba(44,36,22,0.5); backdrop-filter: blur(4px); z-index: 600; justify-content: center; align-items: center; padding: 2rem; }
.sett-overlay.open { display: flex; }
.sett-modal { background: var(--bg-card); border-radius: 16px; max-width: 480px; width: 100%; box-shadow: 0 24px 80px rgba(44,36,22,0.25); animation: modalIn 0.3s ease; overflow: hidden; }
.sett-hdr { padding: 1.5rem 1.5rem 1rem; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
.sett-hdr h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; }
.sett-hdr button { width: 32px; height: 32px; border: 1px solid var(--border); border-radius: 50%; background: var(--bg-card); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--text-muted); }
.sett-hdr button:hover { background: var(--tag-bg); color: var(--text); }
.sett-body { padding: 1.25rem 1.5rem 1.5rem; display: flex; flex-direction: column; gap: 1rem; }
.sett-body label { font-family: 'DM Mono', monospace; font-size: 0.68rem; letter-spacing: 0.12em; text-transform: uppercase; color: var(--accent); display: block; margin-bottom: 0.35rem; }
.sett-body input { width: 100%; padding: 0.6rem 0.75rem; border: 1px solid var(--border); border-radius: 8px; font-size: 0.88rem; font-family: 'Source Sans 3', sans-serif; background: var(--bg); color: var(--text); }
.sett-body input:focus { outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px rgba(196,105,61,0.12); }
.sett-body .hint { font-size: 0.72rem; color: var(--text-muted); margin-top: 0.15rem; }
.sett-acts { display: flex; gap: 0.5rem; justify-content: flex-end; padding: 0 1.5rem 1.5rem; }
.sett-acts button { padding: 0.5rem 1.25rem; border-radius: 8px; font-size: 0.85rem; font-weight: 600; font-family: 'Source Sans 3', sans-serif; cursor: pointer; border: 1px solid var(--border); }
.btn-sav { background: var(--accent) !important; color: #fff !important; border-color: var(--accent) !important; }
.btn-sav:hover { background: var(--accent-dark) !important; }
.btn-can { background: var(--bg-card); color: var(--text-muted); }
.btn-can:hover { background: var(--tag-bg); color: var(--text); }

@keyframes aiPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
.ai-thinking { animation: aiPulse 1.2s ease-in-out infinite; }

</style>
</head>
<body>

<div class="hero">
  <h1>Deliciousness</h1>
  <div class="subtitle">A Plant-Based Cookbook</div>
  <div class="author">Bradley James Boldt</div>
</div>

<div class="nav-bar">
  <div class="search-wrap">
    <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
    <input type="text" id="searchInput" placeholder="Search recipes...">
  </div>
  <div class="recipe-count" id="recipeCount"></div>
  <button class="ai-cfg-btn" id="aiCfgBtn" title="AI Settings">
    <svg viewBox="0 0 24 24"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z" stroke-linecap="round" stroke-linejoin="round"/><circle cx="12" cy="12" r="3"/></svg>
  </button>
</div>


<!-- AI Command Bar -->
<div class="ai-bar-wrap">
  <div class="ai-bar">
    <div class="ai-icon">AI</div>
    <input type="text" id="aiInput" placeholder='Try: &quot;Add new recipe card for stuffed peppers&quot;' autocomplete="off">
    <button id="aiSend">Generate</button>
  </div>
</div>
<div class="ai-status" id="aiStatus"></div>

<div class="cat-tabs" id="catTabs"></div>

<div class="grid-container">
  <div class="recipe-grid" id="recipeGrid"></div>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">🍃</div>
    <p>No recipes match your search</p>
  </div>
</div>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal" id="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-header" id="modalHeader"></div>
    <div class="modal-body" id="modalBody"></div>
  </div>

<!-- AI Settings Modal -->
<div class="sett-overlay" id="settOverlay">
  <div class="sett-modal">
    <div class="sett-hdr">
      <h3>AI Connection</h3>
      <button id="settClose">&#10005;</button>
    </div>
    <div class="sett-body">
      <div>
        <label>Azure OpenAI Base URL</label>
        <input type="text" id="cfgUrl" placeholder="https://your-resource.openai.azure.com">
        <div class="hint">e.g. https://mycompany.openai.azure.com</div>
      </div>
      <div>
        <label>API Key</label>
        <input type="password" id="cfgKey" placeholder="Enter your Azure OpenAI API key">
      </div>
      <div>
        <label>Deployment Name</label>
        <input type="text" id="cfgDeploy" placeholder="gpt-5" value="gpt-5">
        <div class="hint">Your GPT model deployment name (e.g. gpt-5, gpt-4o)</div>
      </div>
      <div>
        <label>API Version</label>
        <input type="text" id="cfgVer" placeholder="2025-01-01-preview" value="2025-01-01-preview">
      </div>
    </div>
    <div class="sett-acts">
      <button class="btn-can" id="settCancel">Cancel</button>
      <button class="btn-sav" id="settSave">Save &amp; Connect</button>
    </div>
  </div>
</div>

</div>

<script>
const RECIPES = [
  // ─── PANTRY STAPLES ───
  {
    title: "Apple Cider Vinegar",

    steps: ["Mix water and flax seeds together.", "Let stand for about 10 minutes before use."],
    tags: ["egg-free", "quick", "pantry"]
  },
  {

// ─── CATEGORY MAPPING ───
const CATEGORIES = [
  "All",
  "Pantry Staples",
  "Bread",
  "Soups, Salads & Pastas",
  "Main Course",
  "Brunch",
  "Small Meals & Snacks",
  "Cheese",
  "Desserts"
];

let activeCategory = "All";
let searchQuery = "";

// ─── RENDER ───
function renderTabs() {
  const tabs = document.getElementById('catTabs');
  tabs.innerHTML = CATEGORIES.map(cat =>
    `<div class="cat-tab ${cat === activeCategory ? 'active' : ''}" data-cat="${cat}">${cat}</div>`
  ).join('');
  tabs.querySelectorAll('.cat-tab').forEach(tab => {
    tab.addEventListener('click', () => {
      activeCategory = tab.dataset.cat;
      renderTabs();
      renderGrid();
    });
  });
}

function getFilteredRecipes() {
  return RECIPES.filter(r => {
    const matchesCat = activeCategory === "All" || r.category === activeCategory;
    if (!searchQuery) return matchesCat;
    const q = searchQuery.toLowerCase();
    const matchesSearch =
      r.title.toLowerCase().includes(q) ||
      r.description.toLowerCase().includes(q) ||
      r.ingredients.some(i => i.toLowerCase().includes(q)) ||
      r.tags.some(t => t.toLowerCase().includes(q)) ||
      r.category.toLowerCase().includes(q);
    return matchesCat && matchesSearch;
  });
}

function renderGrid() {
  const grid = document.getElementById('recipeGrid');
  const empty = document.getElementById('emptyState');
  const count = document.getElementById('recipeCount');
  const filtered = getFilteredRecipes();

  count.textContent = `${filtered.length} recipe${filtered.length !== 1 ? 's' : ''}`;

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map((r, i) => {
    const idx = RECIPES.indexOf(r);
    const aiCls = r._ai ? ' ai-gen' : '';
    const delBtn = r._ai ? '<button class="card-del" onclick="removeRecipe('+idx+')" title="Remove">&#10005;</button>' : '';
    return '<div class="recipe-card' + aiCls + '" data-idx="' + idx + '">' + delBtn +
      '<div class="card-cat">' + r.category + '</div>' +
      '<h3>' + r.title + '</h3>' +
      '<div class="card-desc">' + r.description + '</div>' +
      '<div class="card-tags">' + r.tags.map(t => '<span>' + t + '</span>').join('') + '</div></div>';
  }).join('');

  grid.querySelectorAll('.recipe-card').forEach(card => {
    card.addEventListener('click', () => openModal(parseInt(card.dataset.idx)));
  });
}

function openModal(idx) {
  const r = RECIPES[idx];
  const overlay = document.getElementById('modalOverlay');
  const header = document.getElementById('modalHeader');
  const body = document.getElementById('modalBody');

  header.innerHTML = `
    <div class="modal-cat">${r.category}${r._ai ? ' \u00b7 AI Generated' : ''}</div>
    <h2>${r.title}</h2>
    ${r.description ? `<div class="modal-desc">${r.description}</div>` : ''}
  `;

  let html = '<h4>Ingredients</h4><ul>';
  r.ingredients.forEach(i => html += `<li>${i}</li>`);
  html += '</ul><h4>Instructions</h4><ol>';
  r.steps.forEach(s => html += `<li>${s}</li>`);
  html += '</ol>';
  if (r.notes) {
    html += `<div class="modal-notes"><strong>Notes:</strong> ${r.notes}</div>`;
  }

  body.innerHTML = html;
  overlay.classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

// ─── EVENTS ───
document.getElementById('modalClose').addEventListener('click', closeModal);
document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) closeModal();
});
document.addEventListener('keydown', e => { if (e.key === 'Escape') { closeModal(); if (typeof closeSett === 'function') closeSett(); } });

document.getElementById('searchInput').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});


// ─── AI CONFIG (localStorage) ───
const AI_KEY = 'deliciousness_ai_cfg';
function loadCfg() { try { return JSON.parse(localStorage.getItem(AI_KEY)) || {}; } catch { return {}; } }
function saveCfg(c) { localStorage.setItem(AI_KEY, JSON.stringify(c)); updIndicator(); }
function updIndicator() {
  const c = loadCfg(), b = document.getElementById('aiCfgBtn');
  b.classList.toggle('connected', !!(c.baseUrl && c.apiKey && c.deploy));
}
function setStatus(msg, type) {
  const el = document.getElementById('aiStatus');
  el.textContent = msg; el.className = 'ai-status' + (type ? ' ' + type : '');
}

// Settings modal
document.getElementById('aiCfgBtn').addEventListener('click', () => {
  const c = loadCfg();
  document.getElementById('cfgUrl').value = c.baseUrl || '';
  document.getElementById('cfgKey').value = c.apiKey || '';
  document.getElementById('cfgDeploy').value = c.deploy || 'gpt-5';
  document.getElementById('cfgVer').value = c.apiVer || '2025-01-01-preview';
  document.getElementById('settOverlay').classList.add('open');
});
function closeSett() { document.getElementById('settOverlay').classList.remove('open'); }
document.getElementById('settClose').addEventListener('click', closeSett);
document.getElementById('settCancel').addEventListener('click', closeSett);
document.getElementById('settOverlay').addEventListener('click', e => { if (e.target === e.currentTarget) closeSett(); });
document.getElementById('settSave').addEventListener('click', () => {
  saveCfg({
    baseUrl: document.getElementById('cfgUrl').value.trim().replace(/\/+$/, ''),
    apiKey: document.getElementById('cfgKey').value.trim(),
    deploy: document.getElementById('cfgDeploy').value.trim() || 'gpt-5',
    apiVer: document.getElementById('cfgVer').value.trim() || '2025-01-01-preview'
  });
  closeSett();
  setStatus('Connected — ready to generate recipes', 'success');
});

// AI Generation
async function genRecipe(prompt) {
  const c = loadCfg();
  if (!c.baseUrl || !c.apiKey || !c.deploy) { setStatus('Configure AI connection first (click gear icon)', 'error'); return null; }

  const sys = `You are a recipe assistant for a plant-based cookbook called "Deliciousness". Respond ONLY with valid JSON (no markdown, no backticks) in this format:
{"title":"Name","category":"One of: Pantry Staples, Bread, Soups Salads & Pastas, Main Course, Brunch, Small Meals & Snacks, Cheese, Desserts","description":"Short description.","ingredients":["item 1","item 2"],"steps":["Step 1.","Step 2."],"notes":"Optional tips.","tags":["tag1","tag2","tag3"]}
Make recipes plant-based/vegan with realistic measurements and detailed steps. Pick the best category. Generate 3-5 lowercase tags.`;

  const url = c.baseUrl + '/openai/deployments/' + c.deploy + '/chat/completions?api-version=' + c.apiVer;
  try {
    const resp = await fetch(url, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'api-key': c.apiKey },
      body: JSON.stringify({ messages: [{ role: 'system', content: sys }, { role: 'user', content: prompt }], temperature: 0.7, max_tokens: 1200 })
    });
    if (!resp.ok) { const e = await resp.json().catch(() => ({})); throw new Error(e.error?.message || 'HTTP ' + resp.status); }
    const data = await resp.json();
    const raw = data.choices?.[0]?.message?.content;
    if (!raw) throw new Error('Empty API response');
    const cleaned = raw.replace(/```json\s*/gi, '').replace(/```\s*/gi, '').trim();
    const r = JSON.parse(cleaned);
    if (!r.title || !r.ingredients || !r.steps) throw new Error('Invalid recipe structure');
    r.category = r.category || 'Main Course';
    r.description = r.description || '';
    r.tags = r.tags || [];
    r._ai = true;
    return r;
  } catch (err) { setStatus('Error: ' + err.message, 'error'); return null; }
}

// AI bar events
const aiIn = document.getElementById('aiInput'), aiBtn = document.getElementById('aiSend');
async function handleAI() {
  const p = aiIn.value.trim(); if (!p) return;
  aiBtn.disabled = true; aiBtn.textContent = '...'; aiIn.disabled = true;
  setStatus('Generating recipe with AI...', '');
  document.getElementById('aiStatus').classList.add('ai-thinking');
  const recipe = await genRecipe(p);
  document.getElementById('aiStatus').classList.remove('ai-thinking');
  aiBtn.disabled = false; aiBtn.textContent = 'Generate'; aiIn.disabled = false;
  if (recipe) {
    RECIPES.unshift(recipe);
    activeCategory = 'All'; searchQuery = '';
    document.getElementById('searchInput').value = '';
    renderTabs(); renderGrid(); aiIn.value = '';
    setStatus('Added "' + recipe.title + '" to your cookbook', 'success');
    setTimeout(() => {
      const fc = document.querySelector('.recipe-card');
      if (fc) { fc.scrollIntoView({ behavior: 'smooth', block: 'center' });
        fc.style.outline = '2px solid var(--accent)'; fc.style.outlineOffset = '2px';
        setTimeout(() => { fc.style.outline = ''; fc.style.outlineOffset = ''; }, 2000);
      }
    }, 100);
  }
}
aiBtn.addEventListener('click', handleAI);
aiIn.addEventListener('keydown', e => { if (e.key === 'Enter') handleAI(); });

function removeRecipe(idx) { event.stopPropagation(); RECIPES.splice(idx, 1); renderGrid(); }

// ─── INIT ───
updIndicator();
renderTabs();
renderGrid();
</script>
